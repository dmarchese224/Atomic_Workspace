<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atomic Workspace</title>
  <!-- Favicon Integration -->
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Force Tailwind to use the 'dark' class for manual theme switching
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; transition: background-color 0.3s ease; }
    .modal-overlay { background-color: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px); }
    
    /* Ensure the body takes full height and handles transitions */
    html, body, #root { height: 100%; margin: 0; padding: 0; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- BUILT-IN SVG ICONS ---
    const Icons = {
      Dashboard: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
      Briefcase: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
      Tasks: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>,
      Calendar: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
      Docs: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
      Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
      Sun: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
      Moon: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
      Menu: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
      X: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      Download: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      Upload: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
      Eye: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
      Edit: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      Alert: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
      Link: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    };

    const AtomicLogo = ({ className }) => (
      <svg viewBox="0 0 512 512" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="512" rx="64" fill="#800000"/>
        <g stroke="white" strokeWidth="12" opacity="0.8">
          <ellipse cx="256" cy="220" rx="140" ry="50" />
          <ellipse cx="256" cy="220" rx="140" ry="50" transform="rotate(60 256 220)" />
          <ellipse cx="256" cy="220" rx="140" ry="50" transform="rotate(-60 256 220)" />
        </g>
        <circle cx="256" cy="220" r="24" fill="white"/>
        <text x="50%" y="420" textAnchor="middle" fill="white" fontSize="64px" fontWeight="bold" fontFamily="sans-serif">AWspace</text>
      </svg>
    );

    const STORAGE_KEY = 'awspace_data_v6';
    const MAROON = '#800000';

    const App = () => {
      const [activeRole, setActiveRole] = useState('global');
      const [roles, setRoles] = useState([
        { id: 'global', name: 'Global Overview', color: '#4b5563' },
        { id: 'role-1', name: 'Primary Role', color: '#800000' }
      ]);
      const [tasks, setTasks] = useState([]);
      const [events, setEvents] = useState([]);
      const [notes, setNotes] = useState([]); 
      const [activeNoteId, setActiveNoteId] = useState(null);
      const [isSidebarOpen, setSidebarOpen] = useState(window.innerWidth >= 768);
      const [darkMode, setDarkMode] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [noteEditMode, setNoteEditMode] = useState(true);
      const [linkedFileHandle, setLinkedFileHandle] = useState(null);
      const fileInputRef = useRef(null);

      const [showNewWorkspaceModal, setShowNewWorkspaceModal] = useState(false);
      const [newWorkspaceName, setNewWorkspaceName] = useState('');
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);

      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      useEffect(() => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          try {
            const data = JSON.parse(saved);
            if (data.roles) setRoles(data.roles);
            if (data.tasks) setTasks(data.tasks);
            if (data.events) setEvents(data.events);
            if (data.notes) setNotes(data.notes);
            if (data.darkMode !== undefined) setDarkMode(data.darkMode);
          } catch (e) { console.error(e); }
        }
      }, []);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ roles, tasks, events, notes, darkMode }));
      }, [roles, tasks, events, notes, darkMode]);

      const filteredTasks = useMemo(() => activeRole === 'global' ? tasks : tasks.filter(t => t.roleId === activeRole), [tasks, activeRole]);
      const filteredEvents = useMemo(() => activeRole === 'global' ? events : events.filter(e => e.roleId === activeRole), [events, activeRole]);
      const filteredNotes = useMemo(() => activeRole === 'global' ? notes : notes.filter(n => n.roleId === activeRole), [notes, activeRole]);
      const currentRoleData = roles.find(r => r.id === activeRole) || roles[0];
      const activeNote = notes.find(n => n.id === activeNoteId);

      const addTask = (text) => {
        const roleId = activeRole === 'global' ? (roles.find(r => r.id !== 'global')?.id || 'role-1') : activeRole;
        setTasks([{ id: Date.now().toString(), roleId, text, completed: false, createdAt: new Date().toISOString() }, ...tasks]);
      };

      const addEvent = (title, date) => {
        const roleId = activeRole === 'global' ? (roles.find(r => r.id !== 'global')?.id || 'role-1') : activeRole;
        setEvents([...events, { id: Date.now().toString(), roleId, title, date, createdAt: new Date().toISOString() }]);
      };

      const createNote = () => {
        const roleId = activeRole === 'global' ? (roles.find(r => r.id !== 'global')?.id || 'role-1') : activeRole;
        const newNote = {
          id: Date.now().toString(),
          roleId,
          title: 'New Markdown Note',
          content: '# New Note\nStart typing...',
          updatedAt: new Date().toISOString()
        };
        setNotes([newNote, ...notes]);
        setActiveNoteId(newNote.id);
        setActiveTab('notes');
      };

      const updateNote = (id, field, value) => {
        setNotes(notes.map(n => n.id === id ? { ...n, [field]: value, updatedAt: new Date().toISOString() } : n));
      };

      const generateMarkdownText = () => {
        let md = `# Atomic Workspace Backup - ${new Date().toLocaleDateString()}\n\n`;
        roles.forEach(role => {
          if (role.id === 'global') return;
          md += `## WORKSPACE: ${role.name}\nID: ${role.id}\nCOLOR: ${role.color}\n\n### TASKS\n`;
          tasks.filter(t => t.roleId === role.id).forEach(t => md += `- [${t.completed ? 'x' : ' '}] ${t.text}\n`);
          md += `\n### CALENDAR\n`;
          events.filter(e => e.roleId === role.id).forEach(e => md += `- ${e.date}: ${e.title}\n`);
          md += `\n### NOTES\n`;
          notes.filter(n => n.roleId === role.id).forEach(n => md += `#### ${n.title}\n${n.content}\n---\n`);
          md += `\n\n`;
        });
        return md;
      };

      // --- PC DIRECT SYNC FEATURE ---
      const linkFile = async () => {
        try {
          // Check for support
          if (!window.showOpenFilePicker) {
            alert("Your current browser doesn't support direct file linking. Use the standard Export/Import instead.");
            return;
          }
          const [handle] = await window.showOpenFilePicker({
            types: [{ description: 'Markdown Files', accept: { 'text/markdown': ['.md'] } }],
            multiple: false
          });
          setLinkedFileHandle(handle);
          alert(`Linked to ${handle.name}. Click 'Push Update' to save directly to this file.`);
        } catch (err) {
          console.error("Linking cancelled or failed", err);
        }
      };

      const pushUpdate = async () => {
        const mdText = generateMarkdownText();
        
        // If we have a linked handle, try to write directly (PC Workflow)
        if (linkedFileHandle) {
          try {
            const writable = await linkedFileHandle.createWritable();
            await writable.write(mdText);
            await writable.close();
            alert(`Direct update to ${linkedFileHandle.name} successful!`);
            return;
          } catch (err) {
            console.error("Direct write failed, falling back to download", err);
          }
        }

        // Fallback: Standard Download (Mobile/Standard Workflow)
        const blob = new Blob([mdText], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `atomic_sync.md`;
        a.click();
      };

      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const text = event.target.result;
            const workspaceSections = text.split('## WORKSPACE: ').slice(1);
            const nRoles = [{ id: 'global', name: 'Global Overview', color: '#4b5563' }];
            const nTasks = []; const nEvents = []; const nNotes = [];

            workspaceSections.forEach(section => {
              const lines = section.split('\n');
              const name = lines[0].trim();
              const id = section.match(/ID: (role-\d+)/)?.[1] || `role-${Date.now()}`;
              const color = section.match(/COLOR: (#\w+)/)?.[1] || MAROON;
              nRoles.push({ id, name, color });

              const tPart = section.split('### TASKS')[1]?.split('### CALENDAR')[0];
              tPart?.split('\n').forEach(l => {
                const m = l.match(/- \[(x| )\] (.*)/);
                if (m) nTasks.push({ id: Math.random().toString(), roleId: id, text: m[2], completed: m[1] === 'x', createdAt: new Date().toISOString() });
              });

              const cPart = section.split('### CALENDAR')[1]?.split('### NOTES')[0];
              cPart?.split('\n').forEach(l => {
                const m = l.match(/- (\d{4}-\d{2}-\d{2}): (.*)/);
                if (m) nEvents.push({ id: Math.random().toString(), roleId: id, title: m[2], date: m[1], createdAt: new Date().toISOString() });
              });

              const nPart = section.split('### NOTES')[1];
              nPart?.split('#### ').slice(1).forEach(noteItem => {
                const lines = noteItem.split('\n');
                const title = lines[0].trim();
                const content = lines.slice(1).join('\n').split('---')[0].trim();
                nNotes.push({ id: Math.random().toString(), roleId: id, title, content, updatedAt: new Date().toISOString() });
              });
            });
            setRoles(nRoles); setTasks(nTasks); setEvents(nEvents); setNotes(nNotes);
          } catch (err) { console.error(err); }
        };
        reader.readAsText(file);
      };

      return (
        <div className={`flex h-full w-full overflow-hidden ${darkMode ? 'dark text-slate-100' : 'text-slate-900'}`}>
          
          {/* Create Modal */}
          {showNewWorkspaceModal && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay">
              <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-3xl p-8 shadow-2xl">
                <h3 className="text-xl font-black mb-4">New Workspace</h3>
                <input autoFocus type="text" value={newWorkspaceName} onChange={(e) => setNewWorkspaceName(e.target.value)}
                  placeholder="e.g. Flight Safety" className="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl p-4 mb-6 focus:ring-2 focus:ring-[#800000] text-slate-900 dark:text-white"
                  onKeyDown={(e) => e.key === 'Enter' && (setRoles([...roles, { id: `role-${Date.now()}`, name: newWorkspaceName, color: MAROON }]), setNewWorkspaceName(''), setShowNewWorkspaceModal(false))}
                />
                <div className="flex gap-4">
                  <button onClick={() => setShowNewWorkspaceModal(false)} className="flex-1 py-3 font-bold text-slate-400 hover:text-slate-600 transition-colors">Cancel</button>
                  <button onClick={() => { if(newWorkspaceName) { setRoles([...roles, { id: `role-${Date.now()}`, name: newWorkspaceName, color: MAROON }]); setNewWorkspaceName(''); setShowNewWorkspaceModal(false); }}}
                    className="flex-1 py-3 bg-[#800000] text-white rounded-xl font-bold hover:bg-rose-900 transition-colors">Create</button>
                </div>
              </div>
            </div>
          )}

          {/* Delete Modal */}
          {showDeleteConfirm && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay">
              <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-3xl p-8 text-center shadow-2xl border border-rose-500/20">
                <div className="text-rose-600 mb-4 flex justify-center"><Icons.Alert /></div>
                <h3 className="text-xl font-bold mb-2">Delete Workspace?</h3>
                <p className="text-sm text-slate-500 mb-8">This removes all associated tasks and documents for this role.</p>
                <div className="flex gap-4">
                  <button onClick={() => setShowDeleteConfirm(null)} className="flex-1 font-bold text-slate-400 hover:text-slate-600 transition-colors">Cancel</button>
                  <button onClick={() => {
                    const id = showDeleteConfirm;
                    setRoles(roles.filter(r => r.id !== id));
                    setTasks(tasks.filter(t => t.roleId !== id));
                    setEvents(events.filter(e => e.roleId !== id));
                    setNotes(notes.filter(n => n.roleId !== id));
                    if (activeRole === id) setActiveRole('global');
                    setShowDeleteConfirm(null);
                  }} className="flex-1 py-3 bg-rose-600 text-white rounded-xl font-bold hover:bg-rose-700 transition-colors">Delete</button>
                </div>
              </div>
            </div>
          )}

          {/* Sidebar */}
          <aside className={`${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} fixed md:relative md:translate-x-0 z-50 w-64 h-full bg-slate-900 flex flex-col transition-transform duration-300`}>
            <div className="p-6">
              <div className="flex flex-col items-center gap-2 mb-10">
                <AtomicLogo className="w-16 h-16 shadow-2xl" />
                <h1 className="text-[10px] font-black text-white tracking-[0.3em] uppercase mt-4">Atomic Workspace</h1>
              </div>
              <nav className="space-y-1">
                <div className="group flex items-center mb-1">
                  <button onClick={() => setActiveRole('global')} className={`flex-1 flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all ${activeRole === 'global' ? 'bg-white/10 text-white border-l-4 border-slate-400' : 'text-slate-400 hover:bg-white/5 hover:text-slate-200'}`}>
                    <Icons.Dashboard />
                    <span className="text-sm font-medium">Overview</span>
                  </button>
                </div>
                <div className="text-[10px] font-bold text-slate-600 uppercase tracking-widest mt-8 mb-4 px-4 text-center">My Roles</div>
                <div className="max-h-[35vh] overflow-y-auto custom-scrollbar pr-2">
                  {roles.filter(r => r.id !== 'global').map(role => (
                    <div key={role.id} className="group flex items-center mb-1">
                      <button onClick={() => { setActiveRole(role.id); if (window.innerWidth < 768) setSidebarOpen(false); }}
                        className={`flex-1 flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all ${activeRole === role.id ? 'bg-white/10 text-white border-l-4 shadow-sm' : 'text-slate-400 hover:bg-white/5 hover:text-slate-200'}`}
                        style={{ borderLeftColor: activeRole === role.id ? role.color : 'transparent' }}
                      >
                        <Icons.Briefcase />
                        <span className="text-sm font-medium truncate">{role.name}</span>
                      </button>
                      <button onClick={() => setShowDeleteConfirm(role.id)} className="opacity-0 group-hover:opacity-40 hover:!opacity-100 p-2 text-rose-500 transition-colors"><Icons.X /></button>
                    </div>
                  ))}
                </div>
                <button onClick={() => setShowNewWorkspaceModal(true)} className="w-full flex items-center gap-3 px-4 py-3 mt-4 text-[10px] font-black text-[#800000] bg-white/5 rounded-xl hover:bg-white/10 uppercase tracking-widest transition-all">
                  <Icons.Plus /> Add Space
                </button>
              </nav>
            </div>
            <div className="mt-auto p-4 border-t border-white/5 space-y-2">
              <div className="grid grid-cols-2 gap-2">
                <button onClick={pushUpdate} className="flex items-center justify-center gap-2 py-3 bg-[#800000] text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-rose-900 shadow-xl transition-colors">
                  <Icons.Download /> Save
                </button>
                <button onClick={() => fileInputRef.current.click()} className="flex items-center justify-center gap-2 py-3 bg-slate-800 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-700 transition-colors">
                  <Icons.Upload /> Load
                </button>
                <input type="file" ref={fileInputRef} onChange={handleImport} className="hidden" accept=".md" />
              </div>
              <div className="flex justify-center pt-2">
                <button onClick={() => setDarkMode(!darkMode)} className="p-2 text-slate-500 hover:text-amber-400 transition-all">
                   {darkMode ? <Icons.Sun /> : <Icons.Moon />}
                </button>
              </div>
            </div>
          </aside>

          {/* Main Content */}
          <main className="flex-1 flex flex-col min-w-0 bg-white dark:bg-slate-950 transition-colors duration-300">
            <header className="h-16 flex items-center justify-between px-4 md:px-8 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950">
              <div className="flex items-center gap-4">
                 <button onClick={() => setSidebarOpen(!isSidebarOpen)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl text-slate-500 transition-colors"><Icons.Menu /></button>
                 <h2 className="font-black text-slate-800 dark:text-white uppercase tracking-tight text-xs md:text-sm flex items-center gap-2 truncate">
                    <div className="w-2 h-2 rounded-full" style={{ backgroundColor: currentRoleData.color }}></div>
                    <span className="truncate">{currentRoleData.name}</span>
                 </h2>
              </div>
              
              <div className="flex items-center gap-2">
                <div className="hidden md:flex bg-slate-100 dark:bg-slate-900 p-1 rounded-2xl mr-4 shrink-0">
                  {['dashboard', 'tasks', 'calendar', 'notes'].map(t => (
                    <button key={t} onClick={() => setActiveTab(t)}
                      className={`px-6 py-2 text-[10px] font-black rounded-xl transition-all ${activeTab === t ? 'bg-white dark:bg-slate-800 text-[#800000] dark:text-rose-400 shadow-lg' : 'text-slate-400 hover:text-slate-600'}`}>{t.toUpperCase()}</button>
                  ))}
                </div>
                <button onClick={() => setDarkMode(!darkMode)} className="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-amber-400 transition-all border border-slate-200 dark:border-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700">
                  {darkMode ? <Icons.Sun /> : <Icons.Moon />}
                </button>
              </div>
            </header>

            <div className="flex-1 overflow-hidden relative">
              {activeTab === 'dashboard' && (
                <div className="h-full overflow-y-auto p-4 md:p-10 space-y-6 pb-20 md:pb-10">
                   <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      <div className="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border border-slate-100 dark:border-slate-800 shadow-sm">
                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2"><Icons.Tasks /> Priority Tasks</h3>
                        <div className="space-y-4">
                          {filteredTasks.filter(t => !t.completed).length === 0 && <div className="text-xs text-slate-400 italic">Everything completed.</div>}
                          {filteredTasks.filter(t => !t.completed).slice(0, 5).map(t => (
                            <div key={t.id} className="flex items-center gap-3 text-sm font-bold">
                              <div className="w-2 h-2 rounded-full" style={{ backgroundColor: roles.find(r => r.id === t.roleId)?.color }}></div>
                              <span className="truncate opacity-80 text-slate-800 dark:text-slate-200">{t.text}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                      <div className="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border border-slate-100 dark:border-slate-800 shadow-sm">
                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2"><Icons.Calendar /> Agenda</h3>
                        <div className="space-y-4">
                          {filteredEvents.length === 0 && <div className="text-xs text-slate-400 italic">No upcoming events.</div>}
                          {filteredEvents.slice(0, 5).map(e => (
                            <div key={e.id} className="flex justify-between text-sm font-bold gap-4">
                              <span className="truncate opacity-80 text-slate-800 dark:text-slate-200">{e.title}</span>
                              <span className="text-[10px] text-slate-400 whitespace-nowrap">{e.date}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                      <div className="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border border-slate-100 dark:border-slate-800 shadow-sm">
                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2"><Icons.Docs /> Recent Notes</h3>
                        <div className="space-y-4">
                          {filteredNotes.length === 0 && <div className="text-xs text-slate-400 italic">No notes created.</div>}
                          {filteredNotes.slice(0, 5).map(n => (
                            <div key={n.id} onClick={() => { setActiveNoteId(n.id); setActiveTab('notes'); }} className="flex items-center gap-3 text-sm cursor-pointer hover:text-[#800000] font-bold">
                              <div className="text-slate-300 dark:text-slate-600"><Icons.Docs /></div>
                              <span className="truncate opacity-80 text-slate-800 dark:text-slate-200">{n.title}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                   </div>
                   
                   {/* UPDATED ATOMIC SYNC HUB */}
                   <div className="bg-gradient-to-br from-[#800000] to-[#500000] text-white p-10 rounded-[3rem] flex flex-col md:flex-row items-center justify-between gap-8 shadow-2xl relative overflow-hidden">
                      <div className="relative z-10 text-center md:text-left">
                        <h3 className="text-3xl font-black mb-2 tracking-tighter uppercase flex items-center justify-center md:justify-start gap-3">
                           Atomic Sync {linkedFileHandle && <span className="text-[10px] bg-emerald-500 text-white px-2 py-1 rounded-full align-middle">LINKED</span>}
                        </h3>
                        <p className="text-rose-200/60 text-[10px] font-bold uppercase tracking-[0.2em] italic">
                          {linkedFileHandle ? `Target: ${linkedFileHandle.name}` : "Sync to OneDrive Workspace"}
                        </p>
                      </div>
                      <div className="flex flex-col md:flex-row gap-4 relative z-10 w-full md:w-auto">
                        <button onClick={linkFile} className="bg-rose-950/40 border border-white/20 text-white px-10 py-5 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-rose-900 transition-all flex items-center justify-center gap-2">
                           <Icons.Link /> Link Sync File
                        </button>
                        <button onClick={pushUpdate} className="bg-white text-[#800000] px-10 py-5 rounded-2xl font-black uppercase text-xs tracking-widest hover:scale-105 transition-all shadow-xl flex items-center justify-center gap-2">
                           <Icons.Download /> Push Update
                        </button>
                      </div>
                   </div>
                </div>
              )}

              {activeTab === 'tasks' && (
                <div className="h-full overflow-y-auto p-4 md:p-10 max-w-2xl mx-auto space-y-6 pb-24 md:pb-10">
                  <input type="text" placeholder="Add task..." className="w-full bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 rounded-[1.5rem] px-8 py-5 focus:outline-none focus:border-[#800000] shadow-sm font-bold text-slate-900 dark:text-white"
                    onKeyDown={(e) => { if (e.key === 'Enter' && e.target.value) { addTask(e.target.value); e.target.value = ''; }}} />
                  <div className="space-y-3">
                    {filteredTasks.map(t => (
                      <div key={t.id} className="flex items-center justify-between p-5 bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 group shadow-sm transition-colors">
                        <div className="flex items-center gap-4 flex-1 truncate">
                          <button onClick={() => setTasks(tasks.map(x => x.id === t.id ? {...x, completed: !x.completed} : x))} className={`w-8 h-8 rounded-xl border-2 flex items-center justify-center transition-all shrink-0 ${t.completed ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-200 dark:border-slate-700'}`}>
                            {t.completed && <Icons.Tasks />}
                          </button>
                          <div className="flex flex-col truncate">
                             <span className={`text-sm font-bold truncate ${t.completed ? 'line-through text-slate-400' : 'text-slate-700 dark:text-slate-200'}`}>{t.text}</span>
                             {activeRole === 'global' && <span className="text-[9px] font-black uppercase tracking-tighter" style={{ color: roles.find(r => r.id === t.roleId)?.color }}>{roles.find(r => r.id === t.roleId)?.name}</span>}
                          </div>
                        </div>
                        <button onClick={() => setTasks(tasks.filter(x => x.id !== t.id))} className="md:opacity-0 group-hover:opacity-100 p-2 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/30 rounded-xl transition-all"><Icons.Trash /></button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {activeTab === 'calendar' && (
                <div className="h-full overflow-y-auto p-4 md:p-10 max-w-2xl mx-auto space-y-6 pb-24 md:pb-10">
                  <div className="bg-white dark:bg-slate-900 p-10 rounded-[3rem] border border-slate-100 dark:border-slate-800 shadow-sm flex flex-col gap-6 transition-colors">
                     <h3 className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400 text-center">New Schedule Entry</h3>
                     <input id="ev-t" placeholder="Event Name" className="bg-slate-50 dark:bg-slate-800 p-5 rounded-2xl border-none focus:ring-2 focus:ring-[#800000] text-sm font-bold text-slate-900 dark:text-white" />
                     <input id="ev-d" type="date" className="bg-slate-50 dark:bg-slate-800 p-5 rounded-2xl border-none focus:ring-2 focus:ring-[#800000] text-sm font-bold text-slate-900 dark:text-white" />
                     <button onClick={() => { const t = document.getElementById('ev-t'); const d = document.getElementById('ev-d'); if(t.value && d.value) { addEvent(t.value, d.value); t.value=''; d.value=''; } }}
                       className="bg-[#800000] text-white py-5 rounded-2xl font-black uppercase text-xs tracking-[0.2em] hover:bg-rose-900 shadow-xl transition-all mt-4">Confirm Event</button>
                  </div>
                  <div className="space-y-4 pt-8">
                     {filteredEvents.sort((a,b) => a.date.localeCompare(b.date)).map(e => (
                       <div key={e.id} className="flex items-center gap-8 p-6 bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800 group shadow-sm transition-colors">
                         <div className="text-center w-14 border-r border-slate-100 dark:border-slate-800 pr-8 shrink-0">
                           <div className="text-[10px] font-black text-[#800000] uppercase">{new Date(e.date).toLocaleString('default', {month:'short'})}</div>
                           <div className="text-3xl font-black text-slate-900 dark:text-white">{new Date(e.date).getUTCDate()}</div>
                         </div>
                         <div className="flex-1 overflow-hidden">
                            <div className="font-bold text-base md:text-lg truncate text-slate-800 dark:text-slate-200">{e.title}</div>
                            {activeRole === 'global' && <div className="text-[9px] font-black uppercase opacity-50 tracking-tighter truncate text-slate-500">{roles.find(r => r.id === e.roleId)?.name}</div>}
                         </div>
                         <button onClick={() => setEvents(events.filter(x => x.id !== e.id))} className="md:opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-rose-500 transition-all"><Icons.Trash /></button>
                       </div>
                     ))}
                  </div>
                </div>
              )}

              {activeTab === 'notes' && (
                <div className="h-full flex flex-col md:flex-row overflow-hidden pb-16 md:pb-0">
                   <div className={`w-full md:w-80 h-full border-r border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/50 p-6 space-y-4 overflow-y-auto transition-colors ${activeNoteId && window.innerWidth < 768 ? 'hidden' : 'block'}`}>
                      <button onClick={createNote} className="w-full flex items-center justify-center gap-2 p-5 bg-white dark:bg-slate-900 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-[1.5rem] text-slate-400 hover:text-[#800000] group font-black text-[10px] tracking-widest uppercase transition-all">
                        <Icons.Plus /> Create Note
                      </button>
                      <div className="space-y-3">
                        {filteredNotes.map(n => (
                          <div key={n.id} onClick={() => setActiveNoteId(n.id)}
                            className={`p-5 rounded-2xl cursor-pointer border transition-all ${activeNoteId === n.id ? 'bg-white dark:bg-slate-900 border-[#800000] shadow-lg scale-[1.02]' : 'bg-white/50 border-transparent hover:bg-white dark:hover:bg-slate-800'}`}>
                             <h4 className="text-sm font-black truncate pr-4 text-slate-900 dark:text-slate-100">{n.title}</h4>
                             <p className="text-[10px] text-slate-400 mt-2 line-clamp-1">{n.content.replace(/[#*`]/g, '')}</p>
                          </div>
                        ))}
                      </div>
                   </div>
                   <div className={`flex-1 h-full bg-white dark:bg-slate-950 p-4 md:p-6 flex flex-col overflow-hidden transition-colors ${!activeNoteId && window.innerWidth < 768 ? 'hidden' : 'block'}`}>
                      {activeNote ? (
                        <>
                          <div className="flex items-center justify-between mb-6 border-b pb-6 border-slate-100 dark:border-slate-800">
                             <div className="flex items-center gap-4 flex-1 truncate">
                                <button onClick={() => setActiveNoteId(null)} className="md:hidden p-2 text-slate-400 hover:text-slate-600 transition-colors"><Icons.X /></button>
                                <input value={activeNote.title} onChange={(e) => updateNote(activeNote.id, 'title', e.target.value)}
                                  className="text-2xl font-black bg-transparent border-none focus:ring-0 w-full p-0 truncate text-slate-900 dark:text-white" />
                             </div>
                             <div className="flex gap-2 shrink-0">
                               <button onClick={() => setNoteEditMode(!noteEditMode)} className="p-3 text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition-all">{noteEditMode ? <Icons.Eye /> : <Icons.Edit />}</button>
                               <button onClick={() => { setNotes(notes.filter(n => n.id !== activeNoteId)); setActiveNoteId(null); }} className="p-3 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/30 rounded-xl transition-all"><Icons.Trash /></button>
                             </div>
                          </div>
                          <div className="flex-1 flex flex-col overflow-hidden">
                            {noteEditMode ? (
                              <textarea value={activeNote.content} onChange={(e) => updateNote(activeNote.id, 'content', e.target.value)}
                                className="flex-1 w-full p-6 bg-slate-50 dark:bg-slate-900/50 rounded-3xl border-none focus:ring-0 font-mono text-sm leading-relaxed resize-none custom-scrollbar text-slate-800 dark:text-slate-200" />
                            ) : (
                              <div className="flex-1 overflow-y-auto p-6 bg-slate-50 dark:bg-slate-900/50 rounded-3xl prose dark:prose-invert max-w-none transition-colors">
                                 <pre className="whitespace-pre-wrap font-sans text-sm font-bold leading-relaxed text-slate-800 dark:text-slate-200">{activeNote.content}</pre>
                              </div>
                            )}
                          </div>
                        </>
                      ) : <div className="flex-1 flex flex-col items-center justify-center opacity-10 italic"><div className="mb-4 transform scale-[4] text-slate-900 dark:text-white"><Icons.Docs /></div><p className="font-black uppercase tracking-[0.2em] text-sm text-slate-900 dark:text-white">Select Document</p></div>}
                   </div>
                </div>
              )}
            </div>

            {/* Mobile Bottom Nav */}
            <div className="md:hidden h-18 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 shrink-0 z-10 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] transition-colors">
               {[
                 { id: 'dashboard', icon: <Icons.Dashboard />, l: 'Home' },
                 { id: 'tasks', icon: <Icons.Tasks />, l: 'Tasks' },
                 { id: 'calendar', icon: <Icons.Calendar />, l: 'Plan' },
                 { id: 'notes', icon: <Icons.Docs />, l: 'Docs' }
               ].map(tab => (
                 <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center justify-center flex-1 py-2 transition-all ${activeTab === tab.id ? 'text-[#800000] scale-110' : 'text-slate-300'}`}>
                   {tab.icon}
                   <span className="text-[9px] font-black uppercase mt-1 tracking-tighter">{tab.l}</span>
                 </button>
               ))}
            </div>
          </main>
        </div>
      );
    };

    const rootEl = document.getElementById('root');
    if (rootEl) {
      const root = ReactDOM.createRoot(rootEl);
      root.render(<App />);
    }
  </script>
</body>
</html>
