<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Atomic Workspace</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#800000">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    html, body, #root { height: 100%; margin: 0; padding: 0; overflow: hidden; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; transition: background-color 0.3s ease; }
    .modal-overlay { background-color: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px); z-index: 200; }
    .app-container { display: flex; height: 100%; width: 100%; }
    .mobile-nav-safe { padding-bottom: env(safe-area-inset-bottom); }
    .auto-save-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }

    .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; border: 1px solid #e2e8f0; font-size: 0.9rem; }
    .markdown-body th { background: #f8fafc; padding: 10px; border: 1px solid #e2e8f0; text-align: left; font-weight: 800; }
    .markdown-body td { padding: 10px; border: 1px solid #e2e8f0; }
    .dark .markdown-body th { background: #1e293b; border-color: #334155; }
    .dark .markdown-body td { border-color: #334155; }
    .markdown-body h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem; border-bottom: 2px solid #800000; padding-bottom: 0.3rem; }
    .markdown-body blockquote { border-left: 4px solid #800000; padding-left: 1rem; color: #64748b; font-style: italic; margin-bottom: 1rem; }

    /* Mindmap Visualizer Styles */
    .map-node { border-left: 3px solid #800000; padding: 8px 12px; margin: 4px 0; border-radius: 4px; background: rgba(128, 0, 0, 0.05); }
    .dark .map-node { background: rgba(255, 255, 255, 0.05); border-left-color: #991b1b; }
    .connector-line { width: 20px; border-top: 2px solid #cbd5e1; margin-top: 15px; flex-shrink: 0; }
    .dark .connector-line { border-top-color: #334155; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const Icons = {
      Dashboard: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
      Briefcase: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
      Tasks: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>,
      Calendar: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
      Docs: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
      Map: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
      Sync: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      Folder: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
      Check: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      Clock: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      Menu: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
      X: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      ChevronLeft: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
      ChevronRight: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
      Sun: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>,
      Moon: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
      Eye: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
      Edit: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    };

    const AtomicLogo = ({ className }) => (
      <svg viewBox="0 0 512 512" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="512" rx="64" fill="#800000"/>
        <g stroke="white" strokeWidth="12" opacity="0.8">
          <ellipse cx="256" cy="220" rx="140" ry="50" /><ellipse cx="256" cy="220" rx="140" ry="50" transform="rotate(60 256 220)" /><ellipse cx="256" cy="220" rx="140" ry="50" transform="rotate(-60 256 220)" />
        </g>
        <circle cx="256" cy="220" r="24" fill="white"/><text x="50%" y="420" textAnchor="middle" fill="white" fontSize="64px" fontWeight="bold">AWspace</text>
      </svg>
    );

    const STORAGE_KEY = 'awspace_v12_mapping';
    const MAROON = '#800000';

    const MapView = ({ lines }) => {
      const buildTree = (lines) => {
        const root = { children: [], level: -1 };
        const stack = [root];
        lines.split('\n').forEach(line => {
          if (!line.trim()) return;
          const level = line.search(/\S/) / 2;
          const content = line.trim().replace(/^[-*]\s*/, '');
          const node = { content, children: [], level };
          while (stack[stack.length - 1].level >= level) stack.pop();
          stack[stack.length - 1].children.push(node);
          stack.push(node);
        });
        return root.children;
      };

      const renderNodes = (nodes) => (
        <div className="flex flex-col gap-2 pl-6">
          {nodes.map((node, i) => (
            <div key={i} className="flex items-start">
              <div className="connector-line"></div>
              <div className="flex-1">
                <div className="map-node shadow-sm font-bold text-sm bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800">{node.content}</div>
                {node.children.length > 0 && renderNodes(node.children)}
              </div>
            </div>
          ))}
        </div>
      );

      return <div className="p-4 overflow-auto">{renderNodes(buildTree(lines))}</div>;
    };

    const App = () => {
      // Configuration for Markdown Engine
      useEffect(() => {
        if (typeof marked !== 'undefined') {
          marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: false,
            mangle: false
          });
        }
      }, []);

      const [activeRole, setActiveRole] = useState('global');
      const [roles, setRoles] = useState([{ id: 'global', name: 'Global Overview', color: '#4b5563' }]);
      const [projects, setProjects] = useState([]);
      const [taskLists, setTaskLists] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [events, setEvents] = useState([]); 
      const [notes, setNotes] = useState([]);
      const [mindmaps, setMindmaps] = useState([]);

      const [activeTab, setActiveTab] = useState('dashboard');
      const [activeNoteId, setActiveNoteId] = useState(null);
      const [activeProjectId, setActiveProjectId] = useState(null);
      const [activeTaskListId, setActiveTaskListId] = useState(null);
      const [activeMapId, setActiveMapId] = useState(null);

      const [isSidebarOpen, setSidebarOpen] = useState(window.innerWidth >= 768);
      const [darkMode, setDarkMode] = useState(false);
      const [calendarView, setCalendarView] = useState('month');
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [noteEditMode, setNoteEditMode] = useState(true);
      const [fileHandle, setFileHandle] = useState(null);
      const [isAutoSaving, setIsAutoSaving] = useState(false);
      const [modal, setModal] = useState({ show: false, type: '', deleteId: null });
      const [modalInput, setModalInput] = useState('');

      const [newTaskText, setNewTaskText] = useState('');
      const [newTaskDate, setNewTaskDate] = useState('');
      const [newTaskTime, setNewTaskTime] = useState('');

      const fileInputRef = useRef(null);

      useEffect(() => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          try {
            const d = JSON.parse(saved);
            if (d.roles) setRoles(d.roles);
            if (d.projects) setProjects(d.projects);
            if (d.taskLists) setTaskLists(d.taskLists);
            if (d.tasks) setTasks(d.tasks);
            if (d.events) setEvents(d.events);
            if (d.notes) setNotes(d.notes);
            if (d.mindmaps) setMindmaps(d.mindmaps);
            if (d.darkMode !== undefined) setDarkMode(d.darkMode);
          } catch (e) { console.error(e); }
        }
      }, []);

      useEffect(() => {
        setIsAutoSaving(true);
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ roles, projects, taskLists, tasks, events, notes, mindmaps, darkMode }));
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        const timer = setTimeout(() => setIsAutoSaving(false), 800);
        return () => clearTimeout(timer);
      }, [roles, projects, taskLists, tasks, events, notes, mindmaps, darkMode]);

      const filteredTaskLists = useMemo(() => taskLists.filter(l => l.roleId === activeRole), [taskLists, activeRole]);
      const filteredProjects = useMemo(() => projects.filter(p => p.roleId === activeRole), [projects, activeRole]);
      const filteredMaps = useMemo(() => mindmaps.filter(m => m.roleId === activeRole), [mindmaps, activeRole]);
      const activeRoleData = useMemo(() => roles.find(r => r.id === activeRole) || roles[0], [roles, activeRole]);

      const parseAndImport = (text) => {
        try {
          const workspaceSections = text.split('## WORKSPACE: ').slice(1);
          let nRoles = [{ id: 'global', name: 'Global Overview', color: '#4b5563' }];
          let nProjects = [], nTaskLists = [], nTasks = [], nEvents = [], nNotes = [], nMaps = [];

          workspaceSections.forEach(section => {
            const lines = section.split('\n');
            const roleHeader = lines[0];
            const roleId = roleHeader.match(/\[ID:(.*?)\]/)?.[1] || Date.now().toString() + Math.random();
            const roleName = roleHeader.split(' [ID:')[0].trim();
            nRoles.push({ id: roleId, name: roleName, color: MAROON });

            const calPartMatch = section.split('### CALENDAR');
            if (calPartMatch[1]) {
                const calPart = calPartMatch[1].split('###')[0];
                calPart.split('\n').forEach(line => {
                const m = line.match(/- (\d{4}-\d{2}-\d{2}): (.*)/);
                if (m) nEvents.push({ id: Math.random().toString(), roleId, title: m[2].trim(), date: m[1] });
                });
            }

            section.split('### LIST: ').slice(1).forEach(chunk => {
              const listLines = chunk.split('\n');
              const listHeader = listLines[0];
              const listName = listHeader.split(' [LID:')[0].trim();
              const listId = listHeader.match(/\[LID:(.*?)\]/)?.[1] || Math.random().toString();
              nTaskLists.push({ id: listId, roleId, name: listName });
              listLines.slice(1).forEach(line => {
                const tm = line.match(/- \[(x| )\] (.*?) \|D:(.*?)\|T:(.*?)\|/);
                if (tm) {
                    nTasks.push({ id: Math.random().toString(), listId, text: tm[2].trim(), completed: tm[1] === 'x', dueDate: tm[3], dueTime: tm[4] });
                } else {
                    const fallbackTask = line.match(/- \[(x| )\] (.*)/);
                    if (fallbackTask) nTasks.push({ id: Math.random().toString(), listId, text: fallbackTask[2].trim(), completed: fallbackTask[1] === 'x', dueDate: '', dueTime: '' });
                }
              });
            });

            section.split('### PROJECT: ').slice(1).forEach(chunk => {
              const projLines = chunk.split('\n');
              const projHeader = projLines[0];
              const projName = projHeader.split(' [PID:')[0].trim();
              const projId = projHeader.match(/\[PID:(.*?)\]/)?.[1] || Math.random().toString();
              nProjects.push({ id: projId, roleId, name: projName });
              chunk.split('#### NOTE: ').slice(1).forEach(nChunk => {
                const nTitle = nChunk.split('\n')[0].trim();
                const nContent = nChunk.split('\n').slice(1).join('\n').split('---')[0].trim();
                nNotes.push({ id: Math.random().toString(), projectId: projId, title: nTitle, content: nContent });
              });
            });

            section.split('### MINDMAP: ').slice(1).forEach(chunk => {
              const mapHeader = chunk.split('\n')[0];
              const mapName = mapHeader.split(' [MID:')[0].trim();
              const mapId = mapHeader.match(/\[MID:(.*?)\]/)?.[1] || Math.random().toString();
              const mapContent = chunk.split('\n').slice(1).join('\n').split('---')[0].trim();
              nMaps.push({ id: mapId, roleId, name: mapName, content: mapContent });
            });
          });

          setRoles(nRoles); setProjects(nProjects); setTaskLists(nTaskLists); 
          setTasks(nTasks); setEvents(nEvents); setNotes(nNotes); setMindmaps(nMaps);
          alert("Import Success.");
        } catch (e) { alert("Parser Error."); console.error(e); }
      };

      const handleDirectLoad = async () => {
        try {
          if ('showOpenFilePicker' in window) {
            const [handle] = await window.showOpenFilePicker({ types: [{ description: 'MD', accept: { 'text/markdown': ['.md'] } }] });
            const file = await handle.getFile();
            const text = await file.text();
            setFileHandle(handle);
            parseAndImport(text);
          } else {
            fileInputRef.current.click();
          }
        } catch (e) { console.log("Picker closed."); }
      };

      const handleFileChange = async (e) => {
        const file = e.target.files[0];
        if (file) {
          const text = await file.text();
          parseAndImport(text);
        }
      };

      const handleDirectSave = async () => {
        let md = `# Atomic Workspace Backup - ${new Date().toLocaleDateString()}\n\n`;
        roles.filter(r => r.id !== 'global').forEach(role => {
          md += `## WORKSPACE: ${role.name} [ID:${role.id}]\n\n### CALENDAR\n`;
          events.filter(e => e.roleId === role.id).forEach(e => md += `- ${e.date}: ${e.title}\n`);
          taskLists.filter(l => l.roleId === role.id).forEach(l => {
            md += `\n### LIST: ${l.name} [LID:${l.id}]\n`;
            tasks.filter(t => t.listId === l.id).forEach(t => md += `- [${t.completed ? 'x' : ' '}] ${t.text} |D:${t.dueDate || ''}|T:${t.dueTime || ''}|\n`);
          });
          projects.filter(p => p.roleId === role.id).forEach(p => {
            md += `\n### PROJECT: ${p.name} [PID:${p.id}]\n`;
            notes.filter(n => n.projectId === p.id).forEach(n => md += `#### NOTE: ${n.title}\n${n.content}\n---\n`);
          });
          mindmaps.filter(m => m.roleId === role.id).forEach(m => {
            md += `\n### MINDMAP: ${m.name} [MID:${m.id}]\n${m.content}\n---\n`;
          });
          md += `\n***\n\n`;
        });
        try {
          let target = fileHandle;
          if (!target) { target = await window.showSaveFilePicker({ suggestedName: 'atomic_workspace.md' }); setFileHandle(target); }
          const w = await target.createWritable(); await w.write(md); await w.close();
          alert("Synced.");
        } catch (e) {
          const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([md], {type:'text/markdown'})); a.download='atomic_workspace.md'; a.click();
        }
      };

      const switchWorkspace = (id) => {
        setActiveRole(id);
        setActiveProjectId(null); setActiveTaskListId(null); setActiveNoteId(null); setActiveMapId(null);
        if (window.innerWidth < 768) setSidebarOpen(false);
      };

      const handleDelete = () => {
        const { type, deleteId } = modal;
        if (type.includes('role')) {
            setRoles(roles.filter(r => r.id !== deleteId));
            setProjects(projects.filter(p => p.roleId !== deleteId));
            setTaskLists(taskLists.filter(l => l.roleId !== deleteId));
            setMindmaps(mindmaps.filter(m => m.roleId !== deleteId));
            if (activeRole === deleteId) switchWorkspace('global');
        }
        else if (type.includes('project')) {
            setProjects(projects.filter(p => p.id !== deleteId));
            setNotes(notes.filter(n => n.projectId !== deleteId));
            if (activeProjectId === deleteId) { setActiveProjectId(null); setActiveNoteId(null); }
        }
        else if (type.includes('tasklist')) {
            setTaskLists(taskLists.filter(l => l.id !== deleteId));
            setTasks(tasks.filter(t => t.listId !== deleteId));
            if (activeTaskListId === deleteId) setActiveTaskListId(null);
        }
        else if (type.includes('mindmap')) {
            setMindmaps(mindmaps.filter(m => m.id !== deleteId));
            if (activeMapId === deleteId) setActiveMapId(null);
        }
        setModal({ show: false, type: '', deleteId: null });
      };

      const handleModalAction = () => {
        const id = Date.now().toString();
        if (modal.type === 'role') setRoles([...roles, { id, name: modalInput, color: MAROON }]);
        if (modal.type === 'project') { setProjects([...projects, { id, roleId: activeRole, name: modalInput }]); setActiveProjectId(id); }
        if (modal.type === 'tasklist') { setTaskLists([...taskLists, { id, roleId: activeRole, name: modalInput }]); setActiveTaskListId(id); }
        if (modal.type === 'mindmap') { setMindmaps([...mindmaps, { id, roleId: activeRole, name: modalInput, content: 'Main Topic\n  Sub Topic\n    Detail' }]); setActiveMapId(id); }
        setModal({ show: false, type: '' }); setModalInput('');
      };

      const calendarDaysArr = useMemo(() => {
        const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
        const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
        const res = [];
        for (let i = 0; i < first; i++) res.push({ d: null, full: null });
        for (let i = 1; i <= last; i++) {
          res.push({ d: i, full: `${y}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}` });

{(t.dueDate||t.dueTime)&&<span className="text-[9px] font-black text-rose-800 flex items-center gap-1 uppercase tracking-tighter"><Icons.Clock /> {t.dueDate} {t.dueTime}</span>}</div></div><button onClick={()=>setTasks(tasks.filter(x=>x.id!==t.id))} className="p-2 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/10 rounded-lg"><Icons.Trash /></button></div>))}</div></div>):<div className="h-full flex items-center justify-center italic text-slate-400">Select a Task List.</div>}</div>

              {activeTab==='calendar'&&(

                  <div className="p-4 md:p-8 border-b border-slate-100 dark:border-slate-800 flex flex-col md:flex-row items-center justify-between shrink-0 bg-white dark:bg-slate-950 gap-4"><div className="flex items-center gap-4"><button onClick={()=>setCurrentMonth(new Date(currentMonth.getFullYear(),currentMonth.getMonth()-1, 1))} className="p-2 text-slate-400"><Icons.ChevronLeft /></button><h3 className="text-sm font-black uppercase w-48 text-center">{currentMonth.toLocaleString('default',{month:'long',year:'numeric'})}</h3><button onClick={()=>setCurrentMonth(new Date(currentMonth.getFullYear(),currentMonth.getMonth()+1, 1))} className="p-2 text-slate-400"><Icons.ChevronRight /></button></div><div className="flex gap-2"><button onClick={()=>setCalendarView('month')} className={`px-4 py-2 text-[9px] font-black rounded-lg ${calendarView==='month'?'bg-[#800000] text-white shadow-md':'bg-slate-100 dark:bg-slate-800 text-slate-400'}`}>MONTH</button><button onClick={()=>setCalendarView('agenda')} className={`px-4 py-2 text-[9px] font-black rounded-lg ${calendarView==='agenda'?'bg-[#800000] text-white shadow-md':'bg-slate-100 dark:bg-slate-800 text-slate-400'}`}>LIST</button><button onClick={()=>{const t=prompt("Title:"),d=prompt("Date:",selectedDate); if(t&&d)setEvents([...events,{id:Date.now().toString(),roleId:activeRole,title:t,date:d}]);}} className="bg-[#800000] text-white px-6 py-2 rounded-xl text-[9px] font-black uppercase">NEW</button></div></div>
                  <div className="flex-1 overflow-y-auto p-4 md:p-8 pb-24">{calendarView==='month'?(<div className="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8"><div className="lg:col-span-2 bg-white dark:bg-slate-900 rounded-[2.5rem] border border-slate-100 dark:border-slate-800 overflow-hidden shadow-sm h-fit"><div className="grid grid-cols-7 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50">{['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>(<div key={d} className="py-4 text-[9px] font-black text-slate-400 uppercase text-center">{d}</div>))}</div><div className="grid grid-cols-7">{calendarDaysArr.map((day,idx)=>(<div key={idx} onClick={()=>day.full&&setSelectedDate(day.full)} className={`min-h-[80px] p-2 border-r border-b border-slate-100 dark:border-slate-800 last:border-r-0 cursor-pointer transition-colors ${selectedDate===day.full?'bg-rose-50/50 dark:bg-rose-900/10' : ''}`}>{day.d&&(<> <div className={`text-xs font-black ${selectedDate===day.full?'text-[#800000]':'text-slate-400'}`}>{day.d}</div><div className="flex flex-wrap gap-1 mt-1">{events.filter(e=>e.date===day.full).map(e=>(<div key={e.id} className="w-1.5 h-1.5 rounded-full" style={{backgroundColor:roles.find(r=>r.id===e.roleId)?.color||MAROON}}></div>))}</div></>)}</div>))}</div></div><div><h4 className="text-[10px] font-black uppercase text-[#800000] border-b border-[#800000] pb-2 mb-4 tracking-widest">Plan: {selectedDate}</h4><div className="space-y-4">{events.filter(e=>e.date===selectedDate).map(e=>(<div key={e.id} className="p-5 bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-2xl shadow-sm text-sm font-bold flex justify-between items-start group transition-all"><div><div>{e.title}</div><div className="text-[9px] uppercase text-slate-400 mt-1">{roles.find(r => r.id === e.roleId)?.name}</div></div><button onClick={()=>setEvents(events.filter(x=>x.id!==e.id))} className="opacity-0 group-hover:opacity-100 p-2 text-rose-500 transition-all"><Icons.Trash /></button></div>))}</div></div></div>):(<div className="max-w-2xl mx-auto space-y-4">{events.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>(<div key={e.id} className="flex items-center gap-6 p-6 bg-white dark:bg-slate-900 rounded-[2rem] border border-slate-100 dark:border-slate-800 shadow-sm transition-all group"><div className="text-center w-14 border-r border-slate-100 dark:border-slate-800 pr-4 shrink-0"><div className="text-[10px] font-black text-[#800000] uppercase">{new Date(e.date).toLocaleString('default',{month:'short'})}</div><div className="text-2xl font-black text-slate-900 dark:text-white">{new Date(e.date).getUTCDate()}</div></div><div className="flex-1 truncate font-bold text-sm"><div>{e.title}</div><div className="text-[9px] uppercase text-slate-400">{roles.find(r => r.id === e.roleId)?.name}</div></div><button onClick={()=>setEvents(events.filter(x=>x.id!==e.id))} className="opacity-40 hover:opacity-100 p-2 text-rose-500"><Icons.Trash /></button></div>))}</div>)}</div>
                </div>

              {activeTab==='notes'&&(
                <div className="h-full flex flex-col overflow-hidden">
                   <div className="p-4 border-b border-slate-100 dark:border-slate-800 flex gap-2 shrink-0 bg-white dark:bg-slate-950 overflow-x-auto">{filteredProjects.map(p=>(<div key={p.id} className="flex items-center gap-1 group shrink-0"><button onClick={()=>setActiveProjectId(p.id)} className={`px-4 py-2 text-[10px] font-black rounded-lg transition-all ${activeProjectId===p.id?'bg-[#800000] text-white shadow-md':'bg-slate-100 dark:bg-slate-800 text-slate-400'}`}>{p.name.toUpperCase()}</button><button onClick={()=>setModal({show:true,type:'confirm-project',deleteId:p.id})} className="p-1 text-slate-300 hover:text-rose-500 shrink-0 opacity-40 hover:opacity-100"><Icons.X /></button></div>))}<button onClick={()=>setModal({show:true,type:'project'})} className="p-2 text-[#800000] shrink-0"><Icons.Plus /></button></div>
                   <div className="flex-1 flex flex-col md:flex-row overflow-hidden pb-16 md:pb-0">{activeProjectId?(<><div className={`w-full md:w-80 h-full border-r border-slate-100 dark:border-slate-800 p-6 space-y-4 overflow-y-auto ${activeNoteId&&window.innerWidth<768?'hidden':'block'}`}><button onClick={()=>{const id=Date.now().toString();setNotes([{id,projectId:activeProjectId,title:'New Doc',content:'# New Document'},...notes]);setActiveNoteId(id);}} className="w-full flex items-center justify-center gap-2 p-5 border-2 border-dashed border-slate-100 dark:border-slate-800 rounded-[1.5rem] text-slate-400 font-black text-[10px] uppercase tracking-widest hover:border-[#800000] hover:text-[#800000] transition-all"><Icons.Plus /> New Doc</button>{notes.filter(n=>n.projectId===activeProjectId).map(n=>(<div key={n.id} onClick={()=>setActiveNoteId(n.id)} className={`p-5 rounded-2xl cursor-pointer border transition-all ${activeNoteId===n.id?'bg-white dark:bg-slate-900 border-[#800000] shadow-lg scale-105':'opacity-70'}`}><h4 className="text-sm font-black truncate">{n.title}</h4></div>))}</div><div className={`flex-1 h-full bg-white dark:bg-slate-950 p-4 md:p-6 flex flex-col overflow-hidden ${!activeNoteId&&window.innerWidth<768?'hidden':'block'}`}>{activeNoteId?(<><div className="flex items-center justify-between mb-6 border-b pb-6 border-slate-100 dark:border-slate-800 transition-colors"><div className="flex flex-col flex-1 truncate"><input value={notes.find(n => n.id === activeNoteId)?.title || ''} onChange={e => setNotes(notes.map(n => n.id === activeNoteId ? { ...n, title: e.target.value } : n))} className="text-2xl font-black bg-transparent border-none focus:ring-0 w-full dark:text-white truncate" /><div className={`text-[9px] font-black uppercase flex items-center gap-2 ${isAutoSaving ? 'text-emerald-500 auto-save-pulse' : 'text-slate-400'}`}><Icons.Check /> {isAutoSaving ? 'Saving...' : 'Synced Local'}</div></div><div className="flex gap-2 shrink-0"><button onClick={()=>setNoteEditMode(!noteEditMode)} className="p-3 text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl">{noteEditMode?<Icons.Eye/>:<Icons.Edit/>}</button><button onClick={()=>{setNotes(notes.filter(n=>n.id!==activeNoteId));setActiveNoteId(null);}} className="p-3 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/10 rounded-xl"><Icons.Trash /></button></div></div><div className="flex-1 overflow-hidden h-full">{noteEditMode?<textarea value={notes.find(n => n.id === activeNoteId)?.content || ''} onChange={e => setNotes(notes.map(n => n.id === activeNoteId ? { ...n, content: e.target.value } : n))} className="w-full h-full p-6 bg-slate-50 dark:bg-slate-900/50 rounded-[2rem] border-none focus:ring-0 font-mono text-sm dark:text-slate-200 resize-none custom-scrollbar" />:<div className="p-6 bg-slate-50 dark:bg-slate-900/50 rounded-[2rem] h-full overflow-y-auto custom-scrollbar markdown-body" dangerouslySetInnerHTML={{ __html: (typeof marked !== 'undefined') ? marked.parse(notes.find(n => n.id === activeNoteId)?.content || '') : notes.find(n => n.id === activeNoteId)?.content }} /> }</div></>):<div className="flex-1 flex flex-col items-center justify-center opacity-10 italic scale-150"><Icons.Docs /><p className="text-[10px] font-black mt-2 tracking-widest">Select Doc</p></div>}</div></>):<div className="h-full flex-1 flex items-center justify-center text-slate-400 italic">Select a Project.</div>}</div>
                </div>

              {activeTab==='mapping' && (

                    {filteredMaps.map(m=>(<div key={m.id} className="flex items-center gap-1 shrink-0 group"><button onClick={()=>setActiveMapId(m.id)} className={`px-4 py-2 text-[10px] font-black rounded-lg transition-all ${activeMapId===m.id?'bg-[#800000] text-white shadow-md':'bg-slate-100 dark:bg-slate-800 text-slate-400'}`}>{m.name.toUpperCase()}</button><button onClick={()=>setModal({show:true,type:'confirm-mindmap',deleteId:m.id})} className="p-1 text-slate-300 hover:text-rose-500 opacity-40 hover:opacity-100 transition-all shrink-0"><Icons.X /></button></div>))}
                    <button onClick={()=>setModal({show:true,type:'mindmap'})} className="p-2 text-[#800000] shrink-0"><Icons.Plus /></button>
                  </div>
                  <div className="flex-1 flex flex-col md:flex-row overflow-hidden pb-20 md:pb-0">
                    {activeMapId ? (
                      <>
                        <div className="w-full md:w-1/3 h-1/2 md:h-full border-r border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-950 flex flex-col">
                           <div className="p-4 bg-slate-50 dark:bg-slate-900/50 text-[9px] font-black uppercase tracking-widest text-slate-400 border-b border-slate-100 dark:border-slate-800 flex justify-between">Outline Mode <div className="text-[#800000]">Tab to Indent</div></div>
                           <textarea value={mindmaps.find(m=>m.id===activeMapId)?.content || ''} 
                             onChange={e=>setMindmaps(mindmaps.map(m=>m.id===activeMapId?{...m, content:e.target.value}:m))}
                             onKeyDown={e=>{
                               if(e.key === 'Tab') {
                                 e.preventDefault();
                                 const start = e.target.selectionStart;
                                 const end = e.target.selectionEnd;
                                 const value = e.target.value;
                                 if(!e.shiftKey) {
                                   e.target.value = value.substring(0, start) + "  " + value.substring(end);
                                   e.target.selectionStart = e.target.selectionEnd = start + 2;
                                 } else {
                                   if(value.substring(start-2, start) === "  ") {
                                      e.target.value = value.substring(0, start-2) + value.substring(end);
                                      e.target.selectionStart = e.target.selectionEnd = start - 2;
                                   }
                                 }
                               }
                             }}
                             className="flex-1 w-full p-4 font-mono text-sm focus:ring-0 border-none bg-transparent dark:text-slate-100 resize-none custom-scrollbar" />
                        </div>
                        <div className="flex-1 h-full bg-slate-50 dark:bg-slate-900/30 overflow-auto">
                           <MapView lines={mindmaps.find(m=>m.id===activeMapId)?.content || ''} />
                        </div>
                      </>
                    ) : <div className="h-full flex-1 flex items-center justify-center text-slate-400 italic">Select a Brainstorming Map.</div>}
                  </div>
                </div>
              )}
            </div>

            <div className="fixed bottom-0 left-0 right-0 md:hidden h-20 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 z-[90] shadow-[0_-4px_12px_rgba(0,0,0,0.1)] mobile-nav-safe transition-colors duration-300">
               {[{id:'dashboard',icon:<Icons.Dashboard/>,l:'Home'},{id:'tasks',icon:<Icons.Tasks/>,l:'Tasks'},{id:'calendar',icon:<Icons.Calendar/>,l:'Plan'},{id:'notes',icon:<Icons.Docs/>,l:'Docs'},{id:'mapping',icon:<Icons.Map/>,l:'Maps'}].map(tab=>(<button key={tab.id} onClick={()=>setActiveTab(tab.id)} className={`flex flex-col items-center justify-center flex-1 py-2 transition-all ${activeTab===tab.id?'text-[#800000] scale-110':'text-slate-300'}`}>{tab.icon} <span className="text-[9px] font-black uppercase mt-1 tracking-tighter">{tab.l}</span></button>))}
            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
