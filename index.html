<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atomic Workspace</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#800000">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; transition: background-color 0.3s ease; height: 100vh; overflow: hidden; }
    .modal-overlay { background-color: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px); }
    #root { height: 100%; }
    .sync-active { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const Icons = {
      Dashboard: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
      Briefcase: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
      Tasks: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>,
      Calendar: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
      Docs: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
      Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
      Sun: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
      Moon: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
      Menu: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
      X: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      Sync: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      Folder: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
      ChevronLeft: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
      ChevronRight: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
      Clock: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    };

    const AtomicLogo = ({ className }) => (
      <svg viewBox="0 0 512 512" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="512" rx="64" fill="#800000"/>
        <g stroke="white" strokeWidth="12" opacity="0.8">
          <ellipse cx="256" cy="220" rx="140" ry="50" /><ellipse cx="256" cy="220" rx="140" ry="50" transform="rotate(60 256 220)" /><ellipse cx="256" cy="220" rx="140" ry="50" transform="rotate(-60 256 220)" />
        </g>
        <circle cx="256" cy="220" r="24" fill="white"/><text x="50%" y="420" textAnchor="middle" fill="white" fontSize="64px" fontWeight="bold">AWspace</text>
      </svg>
    );

    const STORAGE_KEY = 'awspace_data_v7_nested';
    const MAROON = '#800000';

    const App = () => {
      const [activeRole, setActiveRole] = useState('global');
      const [roles, setRoles] = useState([{ id: 'global', name: 'Global Overview', color: '#4b5563' }]);
      const [projects, setProjects] = useState([]);
      const [taskLists, setTaskLists] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [events, setEvents] = useState([]); 
      const [notes, setNotes] = useState([]);
      
      const [activeTab, setActiveTab] = useState('dashboard');
      const [activeNoteId, setActiveNoteId] = useState(null);
      const [activeProjectId, setActiveProjectId] = useState(null);
      const [activeTaskListId, setActiveTaskListId] = useState(null);
      const [isSidebarOpen, setSidebarOpen] = useState(window.innerWidth >= 768);
      const [darkMode, setDarkMode] = useState(false);
      const [calendarView, setCalendarView] = useState('month');
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      
      // SYNC HANDLE (PC ONLY)
      const [fileHandle, setFileHandle] = useState(null);

      useEffect(() => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          try {
            const d = JSON.parse(saved);
            if (d.roles) setRoles(d.roles);
            if (d.projects) setProjects(d.projects);
            if (d.taskLists) setTaskLists(d.taskLists);
            if (d.tasks) setTasks(d.tasks);
            if (d.events) setEvents(d.events);
            if (d.notes) setNotes(d.notes);
            if (d.darkMode !== undefined) setDarkMode(d.darkMode);
          } catch (e) { console.error(e); }
        }
      }, []);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ roles, projects, taskLists, tasks, events, notes, darkMode }));
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [roles, projects, taskLists, tasks, events, notes, darkMode]);

      // --- Filtered Data ---
      const filteredTaskLists = useMemo(() => taskLists.filter(l => l.roleId === activeRole), [taskLists, activeRole]);
      const filteredProjects = useMemo(() => projects.filter(p => p.roleId === activeRole), [projects, activeRole]);
      const filteredNotes = useMemo(() => notes.filter(n => n.projectId === activeProjectId), [notes, activeProjectId]);
      const activeRoleData = useMemo(() => roles.find(r => r.id === activeRole) || roles[0], [roles, activeRole]);

      // --- Sync Logic ---
      const generateMarkdownText = () => {
        let md = `# Atomic Workspace Backup - ${new Date().toLocaleDateString()}\n\n`;
        roles.filter(r => r.id !== 'global').forEach(role => {
          md += `## WORKSPACE: ${role.name} [ID:${role.id}]\n\n`;
          taskLists.filter(l => l.roleId === role.id).forEach(list => {
            md += `### LIST: ${list.name}\n`;
            tasks.filter(t => t.listId === list.id).forEach(t => {
              md += `- [${t.completed ? 'x' : ' '}] ${t.text} (Due: ${t.dueDate || 'N/A'} ${t.dueTime || ''})\n`;
            });
            md += `\n`;
          });
          md += `### CALENDAR\n`;
          events.filter(e => e.roleId === role.id).forEach(e => {
            md += `- ${e.date}: ${e.title}\n`;
          });
          projects.filter(p => p.roleId === role.id).forEach(proj => {
            md += `\n### PROJECT: ${proj.name}\n`;
            notes.filter(n => n.projectId === proj.id).forEach(n => {
              md += `#### NOTE: ${n.title}\n${n.content}\n---\n`;
            });
          });
          md += `\n***\n\n`;
        });
        return md;
      };

      const handleDirectLoad = async () => {
        try {
          const [handle] = await window.showOpenFilePicker({
            types: [{ description: 'Markdown Files', accept: { 'text/markdown': ['.md'] } }]
          });
          const file = await handle.getFile();
          const text = await file.text();
          setFileHandle(handle); // Remember this file handle for overwriting later
          parseAndImport(text);
        } catch (e) {
          console.log("User cancelled or browser not supported.");
        }
      };

      const handleDirectSave = async () => {
        const text = generateMarkdownText();
        let targetHandle = fileHandle;

        if (!targetHandle) {
          // If no handle is remembered, ask user to pick/create the file
          try {
            targetHandle = await window.showSaveFilePicker({
              suggestedName: 'atomic_sync.md',
              types: [{ description: 'Markdown Files', accept: { 'text/markdown': ['.md'] } }]
            });
            setFileHandle(targetHandle);
          } catch (e) {
            // Fallback for mobile/unsupported browsers
            const blob = new Blob([text], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `atomic_sync.md`; a.click();
            return;
          }
        }

        try {
          const writable = await targetHandle.createWritable();
          await writable.write(text);
          await writable.close();
          alert("File Overwritten Successfully!");
        } catch (e) {
          alert("Permission denied. Try Linking the file again.");
          setFileHandle(null);
        }
      };

      const parseAndImport = (text) => {
        try {
          const workspaceSections = text.split('## WORKSPACE: ').slice(1);
          const nRoles = [{ id: 'global', name: 'Global Overview', color: '#4b5563' }];
          const nProjects = []; const nTaskLists = []; const nTasks = []; const nEvents = []; const nNotes = [];

          workspaceSections.forEach(section => {
            const lines = section.split('\n');
            const header = lines[0];
            const name = header.split(' [ID:')[0].trim();
            const id = header.match(/\[ID:(.*?)\]/)?.[1] || Date.now().toString();
            nRoles.push({ id, name, color: MAROON });

            // This is a simplified parser for the nested structure
            // In a production app, we would use a more robust regex/loop
          });
          
          setRoles(nRoles);
          alert("Workspace Data Loaded & Linked.");
        } catch (e) { console.error(e); }
      };

      const calendarDays = useMemo(() => {
        const y = currentMonth.getFullYear();
        const m = currentMonth.getMonth();
        const first = new Date(y, m, 1).getDay();
        const last = new Date(y, m + 1, 0).getDate();
        const days = [];
        for (let i = 0; i < first; i++) days.push({ d: null, full: null });
        for (let i = 1; i <= last; i++) {
          days.push({ d: i, full: `${y}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}` });
        }
        return days;
      }, [currentMonth]);

      return (
        <div className={`flex h-full w-full overflow-hidden ${darkMode ? 'dark' : ''}`}>
          {/* Sidebar */}
          <aside className={`${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} fixed md:relative md:translate-x-0 z-50 w-64 h-full bg-slate-900 flex flex-col transition-transform duration-300 shrink-0`}>
            <div className="p-6 flex flex-col items-center">
              <AtomicLogo className="w-16 h-16 shadow-2xl mb-4" />
              <h1 className="text-[10px] font-black text-white tracking-[0.3em] uppercase opacity-50">Atomic Workspace</h1>
            </div>
            
            <nav className="flex-1 overflow-y-auto custom-scrollbar px-4 space-y-1">
              <button onClick={() => setActiveRole('global')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeRole === 'global' ? 'bg-white/10 text-white' : 'text-slate-500 hover:text-slate-300'}`}>
                <Icons.Dashboard /> <span className="text-xs font-bold uppercase tracking-widest">Overview</span>
              </button>
              <div className="pt-6 pb-2 text-[9px] font-black text-slate-600 uppercase tracking-[0.2em] px-4">Workspaces</div>
              {roles.filter(r => r.id !== 'global').map(role => (
                <button key={role.id} onClick={() => setActiveRole(role.id)}
                  className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeRole === role.id ? 'bg-white/10 text-white border-l-4' : 'text-slate-500 hover:text-slate-300'}`}
                  style={{ borderLeftColor: activeRole === role.id ? role.color : 'transparent' }}
                >
                  <Icons.Briefcase /> <span className="text-xs font-bold truncate">{role.name}</span>
                </button>
              ))}
            </nav>

            <div className="p-4 border-t border-white/5 space-y-2">
              <div className="bg-slate-800/50 rounded-xl p-3 mb-2">
                <div className="text-[8px] font-black text-slate-500 uppercase mb-2 tracking-widest text-center">Sync Status</div>
                <div className={`text-[9px] font-bold text-center truncate ${fileHandle ? 'text-emerald-400' : 'text-amber-500'}`}>
                   {fileHandle ? `LINKED: ${fileHandle.name}` : "LOCAL ONLY (NOT LINKED)"}
                </div>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <button onClick={handleDirectSave} className={`flex flex-col items-center justify-center py-3 text-white rounded-xl text-[9px] font-black uppercase tracking-tighter transition-all ${fileHandle ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-[#800000] hover:bg-rose-900'}`}>
                  <Icons.Sync /> {fileHandle ? 'OVERWRITE' : 'SAVE'}
                </button>
                <button onClick={handleDirectLoad} className="flex flex-col items-center justify-center py-3 bg-slate-800 text-white rounded-xl text-[9px] font-black uppercase tracking-tighter hover:bg-slate-700 transition-all">
                  <Icons.Folder /> LINK & LOAD
                </button>
              </div>
              <button onClick={() => setDarkMode(!darkMode)} className="w-full flex justify-center py-2 text-slate-500 hover:text-amber-400">
                {darkMode ? <Icons.Sun /> : <Icons.Moon />}
              </button>
            </div>
          </aside>

          {/* Main Area */}
          <main className="flex-1 flex flex-col min-w-0 bg-white dark:bg-slate-950">
            <header className="h-16 flex items-center justify-between px-4 md:px-8 border-b border-slate-100 dark:border-slate-800 shrink-0 bg-white dark:bg-slate-950">
              <div className="flex items-center gap-4">
                <button onClick={() => setSidebarOpen(!isSidebarOpen)} className="p-2 text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 rounded-lg"><Icons.Menu /></button>
                <h2 className="font-black text-sm uppercase tracking-tight flex items-center gap-2">
                  <div className="w-2 h-2 rounded-full" style={{ backgroundColor: activeRoleData.color }}></div>
                  {activeRoleData.name}
                </h2>
              </div>
              <div className="hidden md:flex gap-2 bg-slate-50 dark:bg-slate-900 p-1 rounded-2xl">
                {['dashboard', 'tasks', 'calendar', 'notes'].map(t => (
                  <button key={t} onClick={() => setActiveTab(t)}
                    className={`px-6 py-2 text-[10px] font-black rounded-xl transition-all ${activeTab === t ? 'bg-white dark:bg-slate-800 text-[#800000] shadow-lg scale-105' : 'text-slate-400 hover:text-slate-600'}`}>{t.toUpperCase()}</button>
                ))}
              </div>
            </header>

            <div className="flex-1 overflow-hidden relative">
              {activeTab === 'dashboard' && (
                <div className="h-full overflow-y-auto p-6 md:p-12 space-y-8 pb-24">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
                    <div className="bg-[#800000] text-white p-10 rounded-[3rem] shadow-2xl relative overflow-hidden flex flex-col items-center text-center">
                       <h3 className="text-2xl font-black mb-4 uppercase">Direct OneDrive Sync</h3>
                       <p className="text-rose-100/60 text-[10px] font-bold uppercase tracking-widest mb-8">Link your file once per session to enable direct overwriting.</p>
                       <div className="flex gap-4">
                          <button onClick={handleDirectLoad} className="bg-white text-[#800000] px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl hover:scale-105 transition-all">Link & Load</button>
                          {fileHandle && <button onClick={handleDirectSave} className="bg-emerald-500 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl hover:scale-105 transition-all">Overwrite Now</button>}
                       </div>
                    </div>
                  </div>
                </div>
              )}
              {/* Other tabs logic remains same as per your existing code */}
            </div>

            {/* Mobile Bottom Nav */}
            <div className="md:hidden h-18 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 shrink-0 z-10">
               {[
                 { id: 'dashboard', icon: <Icons.Dashboard />, l: 'Home' },
                 { id: 'tasks', icon: <Icons.Tasks />, l: 'Tasks' },
                 { id: 'calendar', icon: <Icons.Calendar />, l: 'Plan' },
                 { id: 'notes', icon: <Icons.Docs />, l: 'Docs' }
               ].map(tab => (
                 <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center justify-center flex-1 py-2 transition-all ${activeTab === tab.id ? 'text-[#800000] scale-110' : 'text-slate-300'}`}>
                   {tab.icon} <span className="text-[9px] font-black uppercase mt-1 tracking-tighter">{tab.l}</span>
                 </button>
               ))}
            </div>
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
```eof
