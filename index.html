<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Atomic Workspace</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#800000">
  <link rel="icon" type="image/svg+xml" href="logo.svg">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>

  <script>
    tailwind.config = { darkMode: 'class' };
  </script>

  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 10px;
    }

    html,
    body,
    #root {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      transition: background-color 0.3s ease;
    }

    .modal-overlay {
      background-color: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      z-index: 200;
    }

    .app-container {
      display: flex;
      height: 100%;
      width: 100%;
    }

    .mobile-nav-safe {
      padding-bottom: env(safe-area-inset-bottom);
    }

    .auto-save-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .3;
      }
    }

    /* Markdown styling */
    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      border: 1px solid #e2e8f0;
      font-size: 0.9rem;
    }

    .markdown-body th {
      background: #f8fafc;
      padding: 12px;
      border: 1px solid #e2e8f0;
      text-align: left;
      font-weight: 800;
    }

    .markdown-body td {
      padding: 10px;
      border: 1px solid #e2e8f0;
    }

    .dark .markdown-body th {
      background: #1e293b;
      border-color: #334155;
    }

    .dark .markdown-body td {
      border-color: #334155;
    }

    .markdown-body h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      border-bottom: 2px solid #800000;
      padding-bottom: 0.3rem;
    }

    .markdown-body h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-top: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .markdown-body h3 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }

    .markdown-body p {
      margin-bottom: 1.25rem;
      line-height: 1.6;
    }

    .markdown-body p:last-child {
      margin-bottom: 0;
    }

    .markdown-body ul {
      list-style-type: disc !important;
      padding-left: 1.5rem !important;
      margin-bottom: 1.25rem !important;
    }

    .markdown-body ol {
      list-style-type: decimal !important;
      padding-left: 1.5rem !important;
      margin-bottom: 1.25rem !important;
    }

    .markdown-body li {
      display: list-item !important;
      margin-bottom: 0.4rem;
    }

    .markdown-body li p {
      margin-bottom: 0.5rem;
    }

    .markdown-body blockquote {
      border-left: 4px solid #800000;
      padding-left: 1rem;
      color: #64748b;
      font-style: italic;
      margin-bottom: 1.25rem;
    }

    .markdown-body code {
      background: #f1f5f9;
      padding: 2px 4px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.9em;
    }

    .dark .markdown-body code {
      background: #1e293b;
      color: #cbd5e1;
    }

    .markdown-body pre {
      background: #f1f5f9;
      padding: 1rem;
      border-radius: 0.75rem;
      overflow-x: auto;
      margin-bottom: 1.25rem;
    }

    .dark .markdown-body pre {
      background: #0f172a;
      border: 1px solid #1e293b;
    }

    .map-node {
      border-left: 3px solid #800000;
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: 4px;
      background: rgba(128, 0, 0, 0.05);
    }

    .dark .map-node {
      background: rgba(255, 255, 255, 0.05);
      border-left-color: #991b1b;
    }

    .connector-line {
      width: 20px;
      border-top: 2px solid #cbd5e1;
      margin-top: 15px;
      flex-shrink: 0;
    }

    .dark .connector-line {
      border-top-color: #334155;
    }
  </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const Icons = {
      Dashboard: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /></svg>,
      Briefcase: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></svg>,
      Tasks: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4" /><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" /></svg>,
      Calendar: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></svg>,
      Docs: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" /></svg>,
      Map: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></svg>,
      Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>,
      Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></svg>,
      Sync: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /></svg>,
      Folder: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" /></svg>,
      Check: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" /></svg>,
      Clock: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></svg>,
      Menu: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="18" x2="21" y2="18" /></svg>,
      X: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
      ChevronLeft: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6" /></svg>,
      ChevronRight: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6" /></svg>,
      Sun: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /></svg>,
      Moon: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>,
      Eye: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></svg>,
      Edit: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></svg>,
      Bell: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" /></svg>,
      BellOff: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M13.73 21a2 2 0 0 1-3.46 0" /><path d="M18.63 13A17.89 17.89 0 0 1 18 8" /><path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14" /><path d="M18 8a6 6 0 0 0-9.33-5" /><line x1="1" y1="1" x2="23" y2="23" /></svg>,
    };

    const AtomicLogo = ({ className }) => (
      <svg viewBox="0 0 512 512" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="512" rx="64" fill="#800000" />
        <g stroke="white" strokeWidth="12" opacity="0.8">
          <ellipse cx="256" cy="220" rx="140" ry="50" />
          <ellipse cx="256" cy="220" rx="140" ry="50" transform="rotate(60 256 220)" />
          <ellipse cx="256" cy="220" rx="140" ry="50" transform="rotate(-60 256 220)" />
        </g>
        <circle cx="256" cy="220" r="24" fill="white" />
        <text x="50%" y="420" textAnchor="middle" fill="white" fontSize="64px" fontWeight="bold">AW</text>
      </svg>
    );

    const STORAGE_KEY = 'awspace-v12';
    const MAROON = '#800000';

    const MapView = ({ lines }) => {
      const buildTree = (lines) => {
        const root = { children: [], level: -1 };
        const stack = [root];
        lines.split('\n').forEach(line => {
          if (!line.trim()) return;
          const level = line.search(/\S/);
          const content = line.trim().replace(/^[-*]\s*/, '');
          const node = { content, children: [], level };
          while (stack[stack.length - 1].level >= level) stack.pop();
          stack[stack.length - 1].children.push(node);
          stack.push(node);
        });
        return root.children;
      };
      const renderNodes = (nodes) => (
        <div className="flex flex-col gap-2 pl-6">
          {nodes.map((node, i) => (
            <div key={i} className="flex items-start">
              <div className="connector-line"></div>
              <div className="flex-1">
                <div className="map-node shadow-sm font-bold text-sm bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800">{node.content}</div>
                {node.children.length > 0 && renderNodes(node.children)}
              </div>
            </div>
          ))}
        </div>
      );
      return <div className="p-4 overflow-auto">{renderNodes(buildTree(lines))}</div>;
    };

    const App = () => {
      useEffect(() => {
        if (typeof marked !== 'undefined') {
          marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
        }
      }, []);

      const [activeRole, setActiveRole] = useState('global');
      const [roles, setRoles] = useState([{ id: 'global', name: 'Global Overview', color: '#4b5563' }]);
      const [projects, setProjects] = useState([]);
      const [taskLists, setTaskLists] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [events, setEvents] = useState([]);
      const [notes, setNotes] = useState([]);
      const [mindmaps, setMindmaps] = useState([]);
      const [quickNotes, setQuickNotes] = useState([]);

      const [activeTab, setActiveTab] = useState('dashboard');
      const [activeNoteId, setActiveNoteId] = useState(null);
      const [activeProjectId, setActiveProjectId] = useState(null);
      const [activeTaskListId, setActiveTaskListId] = useState(null);
      const [activeMapId, setActiveMapId] = useState(null);

      const [isSidebarOpen, setSidebarOpen] = useState(window.innerWidth >= 768);
      const [darkMode, setDarkMode] = useState(false);
      const [calendarView, setCalendarView] = useState('month');
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [noteEditMode, setNoteEditMode] = useState(true);

      const [fileHandle, setFileHandle] = useState(null);
      const [storedHandle, setStoredHandle] = useState(null);
      const [syncStatus, setSyncStatus] = useState('disconnected');
      const [isAutoSaving, setIsAutoSaving] = useState(false);

      const [notificationGranted, setNotificationGranted] = useState(false);
      const notifiedTasks = useRef(new Set());

      useEffect(() => {
        if ('Notification' in window) {
          setNotificationGranted(Notification.permission === 'granted');
        }
      }, []);

      const requestNotificationPermission = async () => {
        if (!('Notification' in window)) return alert('Notifications not supported in this browser.');
        const p = await Notification.requestPermission();
        setNotificationGranted(p === 'granted');
      };

      const playChime = () => {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gainNode = ctx.createGain();
          osc.connect(gainNode);
          gainNode.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.5);
          gainNode.gain.setValueAtTime(0.5, ctx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.5);
        } catch (e) { console.error('Audio play failed', e); }
      };

      useEffect(() => {
        if (!notificationGranted) return;
        const interval = setInterval(() => {
          const now = new Date();
          const currentDate = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
          const currentHour = String(now.getHours()).padStart(2, '0');
          const currentMin = String(now.getMinutes()).padStart(2, '0');
          const currentTime = `${currentHour}:${currentMin}`;

          tasks.forEach(t => {
            if (!t.completed && t.dueDate === currentDate && t.dueTime === currentTime && !notifiedTasks.current.has(t.id)) {
              notifiedTasks.current.add(t.id);
              playChime();
              if ('serviceWorker' in navigator) {
                navigator.serviceWorker.ready.then(reg => {
                  reg.showNotification('Task Due: ' + t.text, { body: `Due today at ${t.dueTime}`, icon: 'logo.svg' });
                }).catch(() => {
                  new Notification('Task Due: ' + t.text, { body: `Due today at ${t.dueTime}`, icon: 'logo.svg' });
                });
              } else {
                new Notification('Task Due: ' + t.text, { body: `Due today at ${t.dueTime}`, icon: 'logo.svg' });
              }
            }
          });
        }, 30000);
        return () => clearInterval(interval);
      }, [tasks, notificationGranted]);

      useEffect(() => {
        if (typeof idbKeyval !== 'undefined') {
          idbKeyval.get('sync-file').then(handle => {
            if (handle) setStoredHandle(handle);
          }).catch(console.error);
        }
      }, []);

      const reconnectSync = async () => {
        if (!storedHandle) return;
        try {
          const opts = { mode: 'readwrite' };
          if ((await storedHandle.queryPermission(opts)) === 'granted' ||
            (await storedHandle.requestPermission(opts)) === 'granted') {
            const file = await storedHandle.getFile();
            const text = await file.text();
            setFileHandle(storedHandle);
            setSyncStatus('connected');
            parseAndImport(text);
          }
        } catch (e) {
          console.error(e);
          alert('Failed to reconnect to file.');
        }
      };
      const [modal, setModal] = useState({ show: false, type: '', deleteId: null });
      const [modalInput, setModalInput] = useState('');
      const [eventForm, setEventForm] = useState({ title: '', date: '' });
      const [taskForm, setTaskForm] = useState({ text: '', dueDate: '', dueTime: '' });
      const [quickNoteContent, setQuickNoteContent] = useState('');
      const [moveTarget, setMoveTarget] = useState({ roleId: '', projectId: '' });

      const [newTaskText, setNewTaskText] = useState('');
      const [newTaskDate, setNewTaskDate] = useState('');
      const [newTaskTime, setNewTaskTime] = useState('');

      const fileInputRef = useRef(null);

      const isInitialMount = useRef(true);
      useEffect(() => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          try {
            const d = JSON.parse(saved);
            if (d.roles) setRoles(d.roles);
            if (d.projects) setProjects(d.projects);
            if (d.taskLists) setTaskLists(d.taskLists);
            if (d.tasks) setTasks(d.tasks);
            if (d.events) setEvents(d.events);
            if (d.notes) setNotes(d.notes);
            if (d.mindmaps) setMindmaps(d.mindmaps);
            if (d.quickNotes) setQuickNotes(d.quickNotes);
            if (d.darkMode !== undefined) setDarkMode(d.darkMode);
            if (d.activeRole) setActiveRole(d.activeRole);
            if (d.activeTab) setActiveTab(d.activeTab);
            if (d.activeProjectId) setActiveProjectId(d.activeProjectId);
            if (d.activeNoteId) setActiveNoteId(d.activeNoteId);
            if (d.activeTaskListId) setActiveTaskListId(d.activeTaskListId);
            if (d.activeMapId) setActiveMapId(d.activeMapId);
          } catch (e) {
            console.error(e);
          }
        }
        isInitialMount.current = false;
      }, []);

      useEffect(() => {
        if (isInitialMount.current) return;
        setIsAutoSaving(true);
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          roles, projects, taskLists, tasks, events, notes, mindmaps, quickNotes, darkMode,
          activeRole, activeTab, activeProjectId, activeNoteId, activeTaskListId, activeMapId
        }));
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        const t = setTimeout(() => setIsAutoSaving(false), 800);
        return () => clearTimeout(t);
      }, [roles, projects, taskLists, tasks, events, notes, mindmaps, quickNotes, darkMode, activeRole, activeTab, activeProjectId, activeNoteId, activeTaskListId, activeMapId]);

      const filteredTaskLists = useMemo(() => taskLists.filter(l => l.roleId === activeRole), [taskLists, activeRole]);
      const filteredProjects = useMemo(() => projects.filter(p => p.roleId === activeRole), [projects, activeRole]);
      const filteredMaps = useMemo(() => mindmaps.filter(m => m.roleId === activeRole), [mindmaps, activeRole]);
      const activeRoleData = useMemo(() => roles.find(r => r.id === activeRole) || roles[0], [roles, activeRole]);

      const calendarDaysArr = useMemo(() => {
        const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
        const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
        const res = [];
        for (let i = 0; i < first; i++) res.push({ d: null, full: null });
        for (let i = 1; i <= last; i++) res.push({ d: i, full: `${y}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}` });
        return res;
      }, [currentMonth]);

      const activeNote = notes.find(n => n.id === activeNoteId);

      const handleDirectSave = async (silent = false) => {
        // Build markdown in the exact format parseAndImport expects
        let md = `# Atomic Workspace Backup - ${new Date().toLocaleDateString()}\n\n`;

        if (quickNotes && quickNotes.length > 0) {
          md += `*** QUICK NOTES ***\n`;
          quickNotes.forEach(qn => {
            md += `## QNOTE\n(QID:${qn.id}) D:${qn.date}\n${qn.content}\n---\n`;
          });
        }

        const quickTasks = tasks.filter(t => t.listId === 'quick');
        if (quickTasks.length > 0) {
          md += `*** QUICK TASKS ***\n`;
          quickTasks.forEach(t => {
            const status = t.completed ? '[x]' : '[ ]';
            const datePart = t.dueDate ? ` D:${t.dueDate}` : '';
            const timePart = t.dueTime ? ` T:${t.dueTime}` : '';
            md += `- ${status} ${t.text}${datePart}${timePart} (QID:${t.id})\n`;
          });
        }

        roles
          .filter(r => r.id !== 'global')
          .forEach(role => {
            // Workspace header
            md += `*** WORKSPACE ***\n${role.name} (ID:${role.id})\n`;

            // Calendar
            md += `## CALENDAR\n`;
            events
              .filter(e => e.roleId === role.id)
              .forEach(e => {
                md += `- ${e.date} ${e.title}\n`;
              });

            // Task lists and tasks
            taskLists
              .filter(l => l.roleId === role.id)
              .forEach(l => {
                md += `## TASK LIST\n${l.name} (LID:${l.id})\n`;
                tasks
                  .filter(t => t.listId === l.id)
                  .forEach(t => {
                    const status = t.completed ? '[x]' : '[ ]';
                    const datePart = t.dueDate ? ` D:${t.dueDate}` : '';
                    const timePart = t.dueTime ? ` T:${t.dueTime}` : '';
                    md += `- ${status} ${t.text}${datePart}${timePart}\n`;
                  });
              });

            // Projects and notes
            projects
              .filter(p => p.roleId === role.id)
              .forEach(p => {
                md += `## PROJECT\n${p.name} (PID:${p.id})\n`;
                notes
                  .filter(n => n.projectId === p.id)
                  .forEach(n => {
                    const title = (n.title || '').trim() || 'Untitled Note';
                    const content = (n.content || '').trim();
                    md += `## NOTE\n${title} (NID:${n.id})\n`;
                    if (content) {
                      md += `${content}\n`;
                    }
                    md += `---\n`;
                  });
              });

            // Mindmaps
            mindmaps
              .filter(m => m.roleId === role.id)
              .forEach(m => {
                const name = (m.name || '').trim() || 'Untitled Map';
                const content = (m.content || '').trim();
                md += `## MINDMAP\n${name} (MID:${m.id})\n`;
                if (content) {
                  md += `${content}\n`;
                }
                md += `---\n`;
              });
          });

        try {
          let target = fileHandle;
          if (!target) {
            if (silent === true) return;
            const handles = await window.showSaveFilePicker({
              suggestedName: 'atomic_workspace.md'
            });
            target = handles;
            setFileHandle(target);
            if (typeof idbKeyval !== 'undefined') idbKeyval.set('sync-file', target);
          }
          setSyncStatus('saving');
          const w = await target.createWritable();
          await w.write(md);
          await w.close();
          setSyncStatus('connected');
          if (silent !== true) alert('Synced.');
        } catch (e) {
          if (silent === true) { setSyncStatus('error'); return; }
          const a = document.createElement('a');
          a.href = URL.createObjectURL(
            new Blob([md], { type: 'text/markdown' })
          );
          a.download = 'atomic_workspace.md';
          a.click();
        }
      };

      useEffect(() => {
        if (!fileHandle) return;
        const timer = setTimeout(() => {
          handleDirectSave(true);
        }, 2000);
        return () => clearTimeout(timer);
      }, [roles, projects, taskLists, tasks, events, notes, mindmaps]);

      const parseAndImport = (text) => {
        try {
          let nQuickNotes = [];
          const qnMatch = text.split('*** QUICK NOTES ***');
          if (qnMatch[1]) {
            const qnPart = qnMatch[1].split('*** WORKSPACE ***')[0];
            qnPart.split('## QNOTE').slice(1).forEach(chunk => {
              const lines = chunk.split('\n');
              const header = lines.find(line => line.trim() !== '') || '';
              const id = header.match(/\(QID:(.*?)\)/)?.[1] || Date.now().toString() + Math.random();
              const date = header.match(/D:(.*)/)?.[1] || new Date().toISOString();
              const contentStr = chunk.split('---')[0];
              const content = contentStr.substring(contentStr.indexOf(header) + header.length).trim();
              if (content) nQuickNotes.push({ id, date, content });
            });
          }

          const qtMatch = text.split('*** QUICK TASKS ***');
          if (qtMatch[1]) {
            const qtPart = qtMatch[1].split('*** WORKSPACE ***')[0].split('***')[0];
            qtPart.split('\n').forEach(line => {
              if (!line.trim().startsWith('-')) return;
              const qidMatch = line.match(/\(QID:(.*?)\)/);
              const qid = qidMatch ? qidMatch[1] : Math.random().toString();
              let content = line;
              if (qidMatch) content = content.replace(/\(QID:.*?\)/, '').trim();
              
              const tm = content.match(/-\s(\[x\]|\[ \])\s(.+?)\s?D:(.*?)\s?T:(.*)/);
              if (tm) {
                nTasks.push({ id: qid, listId: 'quick', text: tm[2].trim(), completed: tm[1] === '[x]', dueDate: tm[3].trim(), dueTime: tm[4].trim() });
              } else {
                const tm2 = content.match(/-\s(\[x\]|\[ \])\s(.+)/);
                if (tm2) {
                  nTasks.push({ id: qid, listId: 'quick', text: tm2[2].trim(), completed: tm2[1] === '[x]', dueDate: '', dueTime: '' });
                }
              }
            });
          }

          const workspaceSections = text.split('*** WORKSPACE ***').slice(1);

          let nRoles = [{ id: 'global', name: 'Global Overview', color: MAROON }];
          let nProjects = [], nTaskLists = [], nTasks = [], nEvents = [], nNotes = [], nMaps = [];

          workspaceSections.forEach(section => {
            const lines = section.split('\n');

            // Workspace header: use first non-empty line after the splitter
            const roleHeader = (lines.find(line => line.trim() !== '') || '');
            const roleId = roleHeader.match(/\(ID:(.*?)\)/)?.[1] || Date.now().toString() + Math.random();
            const roleName = roleHeader.split('(ID')[0].trim();
            nRoles.push({
              id: roleId,
              name: roleName || 'Untitled Workspace',
              color: MAROON
            });

            // Calendar
            const calPartMatch = section.split('## CALENDAR');
            if (calPartMatch[1]) {
              const calPart = calPartMatch[1].split('## ')[0];
              calPart.split('\n').forEach(line => {
                const m = line.match(/-\s(\d{4}-\d{2}-\d{2})\s(.+)/);
                if (m) {
                  nEvents.push({
                    id: Math.random().toString(),
                    roleId,
                    title: m[2].trim(),
                    date: m[1]
                  });
                }
              });
            }

            // Task lists
            section.split('## TASK LIST').slice(1).forEach(chunk => {
              const listLines = chunk.split('\n');
              const listHeader = (listLines.find(line => line.trim() !== '') || '');
              const listName = listHeader.split('(LID')[0].trim();
              const listId = listHeader.match(/\(LID:(.*?)\)/)?.[1] || Math.random().toString();
              nTaskLists.push({
                id: listId,
                roleId,
                name: listName || 'Untitled List'
              });

              listLines.slice(1).forEach(line => {
                const tm = line.match(/-\s(\[x\]|\[ \])\s(.+?)\s?D:(.*?)\s?T:(.*)/);
                if (tm) {
                  nTasks.push({
                    id: Math.random().toString(),
                    listId,
                    text: tm[2].trim(),
                    completed: tm[1] === '[x]',
                    dueDate: tm[3],
                    dueTime: tm[4]
                  });
                } else {
                  const fallbackTask = line.match(/-\s(\[x\]|\[ \])\s(.+)/);
                  if (fallbackTask) {
                    nTasks.push({
                      id: Math.random().toString(),
                      listId,
                      text: fallbackTask[2].trim(),
                      completed: fallbackTask[1] === '[x]',
                      dueDate: '',
                      dueTime: ''
                    });
                  }
                }
              });
            });

            // Projects and notes
            section.split('## PROJECT').slice(1).forEach(chunk => {
              const projLines = chunk.split('\n');
              const projHeader = (projLines.find(line => line.trim() !== '') || '');
              const projName = projHeader.split('(PID')[0].trim();
              const projId = projHeader.match(/\(PID:(.*?)\)/)?.[1] || Math.random().toString();
              nProjects.push({
                id: projId,
                roleId,
                name: projName || 'Untitled Project'
              });

              chunk.split('## NOTE').slice(1).forEach(nChunk => {
                const nLines = nChunk.split('\n');
                const nHeader = (nLines.find(line => line.trim() !== '') || '');
                const nTitle = nHeader.split('(NID:')[0].trim() || 'Untitled Note';
                const nId = nHeader.match(/\(NID:(.*?)\)/)?.[1] || Math.random().toString();
                const contentStr = nChunk.split('---')[0];
                const nContent = contentStr.substring(contentStr.indexOf(nHeader) + nHeader.length).trim();
                nNotes.push({
                  id: nId,
                  projectId: projId,
                  title: nTitle,
                  content: nContent
                });
              });
            });

            // Mindmaps
            section.split('## MINDMAP').slice(1).forEach(mChunk => {
              const mapLines = mChunk.split('\n');
              const mapHeader = (mapLines.find(line => line.trim() !== '') || '');
              const mapName = mapHeader.split('(MID')[0].trim();
              const mapId = mapHeader.match(/\(MID:(.*?)\)/)?.[1] || Math.random().toString();
              const mapContent = mapLines.slice(1).join('\n').split('---')[0].trim();
              nMaps.push({
                id: mapId,
                roleId,
                name: mapName || 'Untitled Map',
                content: mapContent
              });
            });
          });

          setRoles(nRoles);
          setProjects(nProjects);
          setTaskLists(nTaskLists);
          setTasks(nTasks);
          setEvents(nEvents);
          setNotes(nNotes);
          setMindmaps(nMaps);
          setQuickNotes(nQuickNotes);
          alert('Import Success.');
        } catch (e) {
          alert('Parser Error.');
          console.error(e);
        }
      };

      const switchWorkspace = (id) => {
        setActiveRole(id);
        setActiveProjectId(null);
        setActiveTaskListId(null);
        setActiveNoteId(null);
        setActiveMapId(null);
        if (window.innerWidth < 768) setSidebarOpen(false);
      };

      const switchProject = (id) => { setActiveProjectId(id); setActiveNoteId(null); };
      const switchTaskList = (id) => setActiveTaskListId(id);

      const openTaskEditModal = (task) => {
        setTaskForm({
          text: task.text,
          dueDate: task.dueDate || "",
          dueTime: task.dueTime || ""
        });
        setModal({ show: true, type: "task-edit", deleteId: task.id });
      };

      const openEventEditModal = (event) => {
        setEventForm({
          title: event.title,
          date: event.date
        });
        setModal({ show: true, type: 'event-edit', deleteId: event.id });
      };

      const handleDelete = () => {
        const { type, deleteId } = modal;
        if (type.includes('role')) {
          setRoles(roles.filter(r => r.id !== deleteId));
          setProjects(projects.filter(p => p.roleId !== deleteId));
          setTaskLists(taskLists.filter(l => l.roleId !== deleteId));
          setMindmaps(mindmaps.filter(m => m.roleId !== deleteId));
          if (activeRole === deleteId) switchWorkspace('global');
        } else if (type.includes('project')) {
          setProjects(projects.filter(p => p.id !== deleteId));
          setNotes(notes.filter(n => n.projectId !== deleteId));
          if (activeProjectId === deleteId) setActiveProjectId(null);
          setActiveNoteId(null);
        } else if (type.includes('tasklist')) {
          setTaskLists(taskLists.filter(l => l.id !== deleteId));
          setTasks(tasks.filter(t => t.listId !== deleteId));
          if (activeTaskListId === deleteId) setActiveTaskListId(null);
        } else if (type.includes('mindmap')) {
          setMindmaps(mindmaps.filter(m => m.id !== deleteId));
          if (activeMapId === deleteId) setActiveMapId(null);
        }
        setModal({ show: false, type: '', deleteId: null });
      };

      const handleModalAction = () => {
        const id = Date.now().toString();
        if (modal.type === 'role') setRoles([...roles, { id, name: modalInput, color: MAROON }]);
        if (modal.type === 'project') {
          setProjects([...projects, { id, roleId: activeRole, name: modalInput }]);
          switchProject(id);
        }
        if (modal.type === 'tasklist') {
          setTaskLists([...taskLists, { id, roleId: activeRole, name: modalInput }]);
          switchTaskList(id);
        }
        if (modal.type === 'mindmap') {
          setMindmaps([...mindmaps, { id, roleId: activeRole, name: modalInput, content: 'Main Topic\n  Sub Topic\n    Detail' }]);
          setActiveMapId(id);
        }
        setModal({ show: false, type: '', deleteId: null });
        setModalInput('');
      };

      const handleEditorTab = (e, stateSetter, stateValue) => {
        if (e.key === 'Tab') {
          e.preventDefault();
          const start = e.target.selectionStart;
          const end = e.target.selectionEnd;
          const value = e.target.value;
          if (!e.shiftKey) {
            const newValue = value.substring(0, start) + '  ' + value.substring(end);
            stateSetter(newValue);
            setTimeout(() => { e.target.selectionStart = e.target.selectionEnd = start + 2; }, 0);
          } else {
            if (value.substring(start - 2, start) === '  ') {
              const newValue = value.substring(0, start - 2) + value.substring(end);
              stateSetter(newValue);
              setTimeout(() => { e.target.selectionStart = e.target.selectionEnd = start - 2; }, 0);
            }
          }
        }

        if (e.key === 'Enter') {
          const start = e.target.selectionStart;
          const value = e.target.value;
          const lines = value.substring(0, start).split('\n');
          const lastLine = lines[lines.length - 1];
          const indentMatch = lastLine.match(/^(\s+)/);
          const bulletMatch = lastLine.match(/^(\s*[-*]\s+)/);
          if (bulletMatch) {
            e.preventDefault();
            const bullet = bulletMatch[1];
            if (lastLine.trim().length <= bullet.trim().length) {
              const newValue = value.substring(0, start - lastLine.length) + value.substring(start);
              stateSetter(newValue);
              return;
            }
            const newValue = value.substring(0, start) + '\n' + bullet + value.substring(start);
            stateSetter(newValue);
            setTimeout(() => { e.target.selectionStart = e.target.selectionEnd = start + 1 + bullet.length; }, 0);
          } else if (indentMatch && indentMatch[1].length > 0) {
            e.preventDefault();
            const indent = indentMatch[1];
            const newValue = value.substring(0, start) + '\n' + indent + value.substring(start);
            stateSetter(newValue);
            setTimeout(() => { e.target.selectionStart = e.target.selectionEnd = start + 1 + indent.length; }, 0);
          }
        }
      };

      return (
        <div className={`app-container ${darkMode ? 'dark bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
          <input type="file" ref={fileInputRef} onChange={e => { const f = e.target.files[0]; if (f) f.text().then(parseAndImport); }} className="hidden" accept=".md" />

          {modal.show && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-3 md:p-4 modal-overlay">
              <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2rem] md:rounded-[3rem] p-5 md:p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
                {modal.type.startsWith('confirm') ? (
                  <>
                    <h3 className="text-xl font-black mb-4 uppercase text-rose-600">Delete Item?</h3>
                    <p className="text-sm text-slate-500 mb-8 font-medium">Action is permanent.</p>
                    <div className="flex flex-col sm:flex-row gap-3 sm:gap-4">
                      <button onClick={() => setModal({ show: false, type: '', deleteId: null })} className="flex-1 py-3 font-bold text-slate-400">Cancel</button>
                      <button onClick={handleDelete} className="flex-1 py-3 bg-rose-600 text-white rounded-xl font-bold">Delete</button>
                    </div>
                  </>
                ) : (modal.type === 'event-edit' || modal.type === 'event-new') ? (
                  <>
                    <h3 className="text-xl font-black mb-4 uppercase">{modal.type === 'event-new' ? 'New Event' : 'Edit Event'}</h3>
                    <div className="space-y-4 mb-6">
                      <div>
                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Title</label>
                        <input
                          autoFocus
                          value={eventForm.title}
                          onChange={e => setEventForm({ ...eventForm, title: e.target.value })}
                          className="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl p-4 dark:text-white focus:ring-2 focus:ring-[#800000]"
                          placeholder="Event title"
                        />
                      </div>
                      <div>
                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Date</label>
                        <input
                          type="date"
                          value={eventForm.date}
                          onChange={e => setEventForm({ ...eventForm, date: e.target.value })}
                          className="w-full min-h-[48px] bg-slate-100 dark:bg-slate-800 border-none rounded-xl p-4 dark:text-white focus:ring-2 focus:ring-[#800000]"
                        />
                      </div>
                    </div>
                    <div className="flex flex-col sm:flex-row gap-3 sm:gap-4">
                      <button
                        onClick={() => {
                          setModal({ show: false, type: '', deleteId: null });
                          setEventForm({ title: '', date: '' });
                        }}
                        className="flex-1 py-3 font-bold text-slate-400"
                      >
                        Cancel
                      </button>
                      <button
                        onClick={() => {
                          const cleanedTitle = eventForm.title.trim();
                          const cleanedDate = eventForm.date;
                          if (!cleanedTitle || !cleanedDate) return;
                          if (modal.type === 'event-new') {
                            setEvents([...events, { id: Date.now().toString(), roleId: activeRole, title: cleanedTitle, date: cleanedDate }]);
                          } else {
                            setEvents(events.map(x => x.id === modal.deleteId ? { ...x, title: cleanedTitle, date: cleanedDate } : x));
                          }
                          setSelectedDate(cleanedDate);
                          setModal({ show: false, type: '', deleteId: null });
                          setEventForm({ title: '', date: '' });
                        }}
                        className="flex-1 py-3 bg-[#800000] text-white rounded-xl font-bold"
                      >
                        Save
                      </button>
                    </div>
                  </>
                ) : (modal.type === 'task-edit') ? (
                  <>
                    <h3 className="text-xl font-black mb-4 uppercase">Edit Task</h3>
                    <div className="space-y-4 mb-6">
                      <div>
                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Task</label>
                        <input
                          autoFocus
                          value={taskForm.text}
                          onChange={e => setTaskForm({ ...taskForm, text: e.target.value })}
                          className="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl p-4 dark:text-white focus:ring-2 focus:ring-[#800000]"
                          placeholder="Task text"
                        />
                      </div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div>
                          <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Due Date</label>
                          <input
                            type="date"
                            value={taskForm.dueDate}
                            onChange={e => setTaskForm({ ...taskForm, dueDate: e.target.value })}
                            className="w-full min-h-[48px] bg-slate-100 dark:bg-slate-800 border-none rounded-xl p-4 dark:text-white focus:ring-2 focus:ring-[#800000]"
                          />
                        </div>
                        <div>
                          <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Due Time</label>
                          <input
                            type="time"
                            value={taskForm.dueTime}
                            onChange={e => setTaskForm({ ...taskForm, dueTime: e.target.value })}
                            className="w-full min-h-[48px] bg-slate-100 dark:bg-slate-800 border-none rounded-xl p-4 dark:text-white focus:ring-2 focus:ring-[#800000]"
                          />
                        </div>
                      </div>
                    </div>
                    <div className="flex flex-col sm:flex-row gap-3 sm:gap-4">
                      <button
                        onClick={() => {
                          setModal({ show: false, type: '', deleteId: null });
                          setTaskForm({ text: '', dueDate: '', dueTime: '' });
                        }}
                        className="flex-1 py-3 font-bold text-slate-400"
                      >
                        Cancel
                      </button>
                      <button
                        onClick={() => {
                          const txt = taskForm.text.trim();
                          if (!txt) return;
                          setTasks(tasks.map(x => x.id === modal.deleteId ? { ...x, text: txt, dueDate: taskForm.dueDate, dueTime: taskForm.dueTime } : x));
                          setModal({ show: false, type: '', deleteId: null });
                          setTaskForm({ text: '', dueDate: '', dueTime: '' });
                        }}
                        className="flex-1 py-3 bg-[#800000] text-white rounded-xl font-bold"
                      >
                        Save
                      </button>
                    </div>
                  </>
                ) : (modal.type === 'quick-note') ? (
                  <>
                    <h3 className="text-xl font-black mb-4 uppercase text-amber-500 tracking-widest">Quick Note</h3>
                    <textarea
                      autoFocus
                      value={quickNoteContent}
                      onChange={e => setQuickNoteContent(e.target.value)}
                      className="w-full h-48 bg-slate-100 dark:bg-slate-800 border-none rounded-xl p-4 mb-6 dark:text-white focus:ring-2 focus:ring-amber-500 resize-none"
                      placeholder="Type your quick note here..."
                    />
                    <div className="flex flex-col sm:flex-row gap-3 sm:gap-4">
                      <button onClick={() => setModal({ show: false, type: '', deleteId: null })} className="flex-1 py-3 font-bold text-slate-400">Cancel</button>
                      <button
                        onClick={() => {
                          if (!quickNoteContent.trim()) return;
                          if (modal.deleteId) {
                            setQuickNotes(quickNotes.map(n => n.id === modal.deleteId ? { ...n, content: quickNoteContent.trim() } : n));
                          } else {
                            setQuickNotes([{ id: Date.now().toString(), content: quickNoteContent.trim(), date: new Date().toISOString() }, ...quickNotes]);
                          }
                          setModal({ show: false, type: '', deleteId: null });
                          setQuickNoteContent('');
                        }}
                        className="flex-1 py-3 bg-amber-500 text-white rounded-xl font-bold uppercase tracking-widest shadow-lg"
                      >
                        Save Note
                      </button>
                    </div>
                  </>
                ) : (modal.type === 'move-quick-note') ? (
                  <>
                    <h3 className="text-xl font-black mb-4 uppercase">Move Note</h3>
                    <div className="space-y-4 mb-6">
                      <div>
                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Workspace</label>
                        <select
                          value={moveTarget.roleId}
                          onChange={e => setMoveTarget({ roleId: e.target.value, projectId: '' })}
                          className="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl p-4 dark:text-white focus:ring-2 focus:ring-[#800000]"
                        >
                          <option value="">Select Workspace...</option>
                          {roles.filter(r => r.id !== 'global').map(r => (
                            <option key={r.id} value={r.id}>{r.name}</option>
                          ))}
                        </select>
                      </div>
                      {moveTarget.roleId && (
                        <div>
                          <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Project</label>
                          <select
                            value={moveTarget.projectId}
                            onChange={e => setMoveTarget({ ...moveTarget, projectId: e.target.value })}
                            className="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl p-4 dark:text-white focus:ring-2 focus:ring-[#800000]"
                          >
                            <option value="">Select Project...</option>

              {activeTab === 'calendar' && (
                <div className="h-full flex flex-col overflow-hidden">
                  <div className="p-4 md:p-8 border-b border-slate-100 dark:border-slate-800 flex flex-col md:flex-row items-stretch md:items-center justify-between shrink-0 bg-white dark:bg-slate-950 gap-4">
                    <div className="flex items-center gap-4">
                      <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1))} className="p-2 text-slate-400">
                        <Icons.ChevronLeft />
                      </button>
                      <h3 className="text-sm font-black uppercase w-48 text-center">
                        {currentMonth.toLocaleString('default', { month: 'long', year: 'numeric' })}
                      </h3>
                      <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1))} className="p-2 text-slate-400">
                        <Icons.ChevronRight />
                      </button>
                    </div>
                    <div className="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
                      <button onClick={() => setCalendarView('month')} className={`px-4 py-2 text-[9px] font-black rounded-lg ${calendarView === 'month' ? 'bg-[#800000] text-white shadow-md' : 'bg-slate-100 dark:bg-slate-800 text-slate-400'}`}>MONTH</button>
                      <button onClick={() => setCalendarView('agenda')} className={`px-4 py-2 text-[9px] font-black rounded-lg ${calendarView === 'agenda' ? 'bg-[#800000] text-white shadow-md' : 'bg-slate-100 dark:bg-slate-800 text-slate-400'}`}>LIST</button>
                      <button
                        onClick={() => {
                          setEventForm({ title: '', date: selectedDate });
                          setModal({ show: true, type: 'event-new', deleteId: null });
                        }}
                        className="bg-[#800000] text-white px-4 md:px-6 py-2 rounded-xl text-[9px] font-black uppercase w-full sm:w-auto"
                      >
                        NEW
                      </button>
                    </div>
                  </div>

                  <div className="flex-1 overflow-y-auto p-4 md:p-8 pb-24">
                    {calendarView === 'month' ? (
                      <div className="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 bg-white dark:bg-slate-900 rounded-[2.5rem] border border-slate-100 dark:border-slate-800 overflow-hidden shadow-sm h-fit">
                          <div className="grid grid-cols-7 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50">
                            {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => (
                              <div key={d} className="py-4 text-[9px] font-black text-slate-400 uppercase text-center">{d}</div>
                            ))}
                          </div>
                          <div className="grid grid-cols-7">
                            {calendarDaysArr.map((day, idx) => (
                              <div
                                key={idx}
                                onClick={() => day.full && setSelectedDate(day.full)}
                                className={`min-h-[80px] p-2 border-r border-b border-slate-100 dark:border-slate-800 last:border-r-0 cursor-pointer transition-colors ${selectedDate === day.full ? 'bg-rose-50/50 dark:bg-rose-900/10' : ''}`}
                              >
                                <div className={`text-xs font-black ${selectedDate === day.full ? 'text-[#800000]' : 'text-slate-400'}`}>{day.d}</div>
                                <div className="flex flex-wrap gap-1 mt-1">
                                  {events.filter(e => e.date === day.full).map(e => (
                                    <div key={e.id} className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: roles.find(r => r.id === e.roleId)?.color || MAROON }}></div>
                                  ))}
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                        <div>
                          <h4 className="text-[10px] font-black uppercase text-[#800000] border-b border-[#800000] pb-2 mb-4 tracking-widest">
                            Plan {selectedDate}
                          </h4>
                          <div className="space-y-4">
                            {events.filter(e => e.date === selectedDate).map(e => (
                              <div
                                key={e.id}
                                className="p-5 bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-2xl shadow-sm text-sm font-bold flex justify-between items-start group transition-all"
                              >
                                <div>
                                  <div>{e.title}</div>
                                  <div className="text-[9px] uppercase text-slate-400 mt-1">
                                    {roles.find(r => r.id === e.roleId)?.name}
                                  </div>
                                  <div className="mt-1 text-[9px] text-slate-400">
                                    {e.date}
                                  </div>
                                </div>
                                <div className="flex items-center gap-1">
                                  <button
                                    onClick={() => openEventEditModal(e)}
                                    className="text-[10px] font-bold text-slate-400 hover:text-[#800000]"
                                  >
                                    Edit
                                  </button>
                                  <button
                                    onClick={() => setEvents(events.filter(x => x.id !== e.id))}
                                    className="opacity-40 group-hover:opacity-100 p-2 text-rose-500 transition-all"
                                  >
                                    <Icons.Trash />
                                  </button>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    ) : (
                      <div className="max-w-2xl mx-auto space-y-4">
                        {events.sort((a, b) => a.date.localeCompare(b.date)).map(e => (
                          <div
                            key={e.id}
                            className="flex items-center gap-6 p-6 bg-white dark:bg-slate-900 rounded-[2rem] border border-slate-100 dark:border-slate-800 shadow-sm transition-all group"
                          >
                            <div className="flex-1">
                              <div className="text-sm font-bold">{e.title}</div>
                              <div className="text-[10px] uppercase text-slate-400 mt-1">
                                {e.date} • {roles.find(r => r.id === e.roleId)?.name}
                              </div>
                            </div>
                            <div className="flex items-center gap-2">
                              <button
                                onClick={() => openEventEditModal(e)}
                                className="text-[10px] font-bold text-slate-400 hover:text-[#800000]"
                              >
                                Edit
                              </button>
                              <button
                                onClick={() => setEvents(events.filter(x => x.id !== e.id))}
                                className="opacity-40 group-hover:opacity-100 p-2 text-rose-500 transition-all"
                              >
                                <Icons.Trash />
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              )}

              {activeTab === 'notes' && (
                <div className="h-full flex flex-col overflow-hidden">
                  <div className="p-4 border-b border-slate-100 dark:border-slate-800 flex gap-2 shrink-0 bg-white dark:bg-slate-950 overflow-x-auto">
                    {activeRole === 'global' ? (
                      <div className="px-4 py-2 text-[10px] font-black rounded-lg bg-amber-500 text-white uppercase tracking-widest flex items-center gap-2">
                        <Icons.Docs /> Unified Quick Notes
                      </div>
                    ) : (
                      <>
                        {filteredProjects.map(p => (
                          <div key={p.id} className="flex items-center gap-1 group shrink-0">
                            <button
                              onClick={() => switchProject(p.id)}
                              className={`px-4 py-2 text-[10px] font-black rounded-lg transition-all ${activeProjectId === p.id ? 'bg-[#800000] text-white shadow-md' : 'bg-slate-100 dark:bg-slate-800 text-slate-400'}`}
                            >
                              {p.name.toUpperCase()}
                            </button>
                            <button
                              onClick={() => setModal({ show: true, type: 'confirm-project', deleteId: p.id })}
                              className="p-1 text-slate-300 hover:text-rose-500 shrink-0 opacity-40 hover:opacity-100"
                            >
                              <Icons.X />
                            </button>
                          </div>
                        ))}
                        <button onClick={() => setModal({ show: true, type: 'project' })} className="p-2 text-[#800000] shrink-0">
                          <Icons.Plus />
                        </button>
                      </>
                    )}
                  </div>

                  <div className="flex-1 flex flex-col md:flex-row overflow-hidden pb-16 md:pb-0">
                    {activeRole === 'global' ? (
                      <div className="flex-1 overflow-y-auto p-4 md:p-12 space-y-4 bg-slate-50 dark:bg-slate-950">
                        <div className="max-w-3xl mx-auto space-y-4">
                          {quickNotes.map(qn => (
                            <div key={qn.id} className="p-6 bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm transition-all group">
                              <div className="flex justify-between items-start gap-4">
                                <div className="flex-1">
                                  <div className="text-xs text-slate-400 mb-2 font-black uppercase tracking-widest">{new Date(qn.date).toLocaleString()}</div>
                                  <div className="text-sm font-medium whitespace-pre-wrap">{qn.content}</div>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-2 shrink-0">
                                  <button onClick={() => { setQuickNoteContent(qn.content); setModal({ show: true, type: 'quick-note', deleteId: qn.id }); }} className="p-2 text-slate-400 hover:text-amber-500 transition-colors bg-slate-100 dark:bg-slate-800 rounded-lg" title="Edit Note">
                                    <Icons.Edit />
                                  </button>
                                  <button onClick={() => setModal({ show: true, type: 'move-quick-note', deleteId: qn.id })} className="p-2 text-slate-400 hover:text-[#800000] transition-colors bg-slate-100 dark:bg-slate-800 rounded-lg" title="Move to Workspace">
                                    <Icons.Folder />
                                  </button>
                                  <button onClick={() => setQuickNotes(quickNotes.filter(n => n.id !== qn.id))} className="p-2 text-slate-400 hover:text-rose-500 transition-colors bg-slate-100 dark:bg-slate-800 rounded-lg" title="Delete Note">
                                    <Icons.Trash />
                                  </button>
                                </div>
                              </div>
                            </div>
                          ))}
                          {quickNotes.length === 0 && (
                            <div className="text-center text-slate-400 italic py-12 flex flex-col items-center">
                              <Icons.Docs className="w-12 h-12 mb-4 opacity-20" />
                              No quick notes yet. Click 'Quick Note' in the sidebar to add one.
                            </div>
                          )}
                        </div>
                      </div>
                    ) : !activeProjectId ? (
                      <div className="h-full flex-1 flex items-center justify-center text-slate-400 italic">
                        Select a Project.
                      </div>
                    ) : (
                      <>
                        <div className={`w-full md:w-80 h-full border-r border-slate-100 dark:border-slate-800 p-6 space-y-4 overflow-y-auto ${activeNoteId && window.innerWidth < 768 ? 'hidden' : 'block'}`}>
                          <button
                            onClick={() => {
                              const id = Date.now().toString();
                              setNotes([{ id, projectId: activeProjectId, title: 'New Doc', content: 'New Document' }, ...notes]);
                              setActiveNoteId(id);
                            }}
                            className="w-full flex items-center justify-center gap-2 p-5 border-2 border-dashed border-slate-100 dark:border-slate-800 rounded-[1.5rem] text-slate-400 font-black text-[10px] uppercase tracking-widest hover:border-[#800000] hover:text-[#800000] transition-all"
                          >
                            <Icons.Plus /> New Doc
                          </button>
                          {notes.filter(n => n.projectId === activeProjectId).map(n => (
                            <div
                              key={n.id}
                              onClick={() => setActiveNoteId(n.id)}
                              className={`p-5 rounded-2xl cursor-pointer border transition-all ${activeNoteId === n.id ? 'bg-white dark:bg-slate-900 border-[#800000] shadow-lg scale-105' : 'opacity-70'}`}
                            >
                              <h4 className="text-sm font-black truncate">{n.title}</h4>
                            </div>
                          ))}
                        </div>

                        <div className={`flex-1 h-full bg-white dark:bg-slate-950 p-4 md:p-6 flex flex-col overflow-hidden ${!activeNoteId && window.innerWidth < 768 ? 'hidden' : 'block'}`}>
                          {activeNote ? (
                            <>
                              <div className="flex items-center justify-between mb-6 border-b pb-6 border-slate-100 dark:border-slate-800 transition-colors">
                                <div className="flex flex-col flex-1 truncate">
                                  <input
                                    value={activeNote.title}
                                    onChange={e => setNotes(notes.map(n => n.id === activeNoteId ? { ...n, title: e.target.value } : n))}
                                    className="text-2xl font-black bg-transparent border-none focus:ring-0 w-full dark:text-white truncate"
                                  />
                                  <div className="text-[9px] font-black uppercase flex items-center gap-2">
                                    {syncStatus === 'saving' ? (
                                      <span className="text-emerald-500 auto-save-pulse">Saving to File...</span>
                                    ) : isAutoSaving ? (
                                      <span className="text-emerald-500 auto-save-pulse">Saving Local...</span>
                                    ) : syncStatus === 'connected' ? (
                                      <span className="text-emerald-600"><Icons.Check /> Synced File</span>
                                    ) : (
                                      <span className="text-slate-400">
                                        <Icons.Check /> Synced Local
                                      </span>
                                    )}
                                  </div>
                                </div>
                                <div className="flex gap-2 shrink-0">
                                  <button
                                    onClick={() => setNoteEditMode(!noteEditMode)}
                                    className="p-3 text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl"
                                  >
                                    {noteEditMode ? <Icons.Eye /> : <Icons.Edit />}
                                  </button>
                                  <button
                                    onClick={() => {
                                      setNotes(notes.filter(n => n.id !== activeNoteId));
                                      setActiveNoteId(null);
                                    }}
                                    className="p-3 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/10 rounded-xl"
                                  >
                                    <Icons.Trash />
                                  </button>
                                </div>
                              </div>

                              <div className="flex-1 overflow-hidden h-full">
                                {noteEditMode ? (
                                  <textarea
                                    value={activeNote.content}
                                    onKeyDown={e => handleEditorTab(e, v => setNotes(notes.map(n => n.id === activeNoteId ? { ...n, content: v } : n)))}
                                    onChange={e => setNotes(notes.map(n => n.id === activeNoteId ? { ...n, content: e.target.value } : n))}
                                    className="w-full h-full p-6 bg-slate-50 dark:bg-slate-900/50 rounded-[2rem] border-none focus:ring-0 font-mono text-sm dark:text-slate-200 resize-none custom-scrollbar"
                                  />
                                ) : (
                                  <div
                                    className="p-6 bg-slate-50 dark:bg-slate-900/50 rounded-[2rem] h-full overflow-y-auto custom-scrollbar markdown-body"
                                    dangerouslySetInnerHTML={{ __html: typeof marked !== 'undefined' ? marked.parse(activeNote.content || '') : (activeNote.content || '') }}
                                  />
                                )}
                              </div>
                            </>
                          ) : (
                            <div className="flex-1 flex items-center justify-center opacity-10 italic scale-150">
                              <Icons.Docs />
                              <p className="text-[10px] font-black mt-2 tracking-widest">Select Doc</p>
                            </div>
                          )}
                        </div>
                      </>
                    )}
                  </div>
                </div>
              )}

              {activeTab === 'mapping' && (
                <div className="h-full flex flex-col overflow-hidden">
                  <div className="p-4 border-b border-slate-100 dark:border-slate-800 flex gap-2 overflow-x-auto shrink-0 bg-white dark:bg-slate-950">
                    {filteredMaps.map(m => (
                      <div key={m.id} className="flex items-center gap-1 shrink-0 group">
                        <button
                          onClick={() => setActiveMapId(m.id)}
                          className={`px-4 py-2 text-[10px] font-black rounded-lg transition-all ${activeMapId === m.id ? 'bg-[#800000] text-white shadow-md' : 'bg-slate-100 dark:bg-slate-800 text-slate-400'}`}
                        >
                          {m.name.toUpperCase()}
                        </button>
                        <button
                          onClick={() => setModal({ show: true, type: 'confirm-mindmap', deleteId: m.id })}
                          className="p-1 text-slate-300 hover:text-rose-500 opacity-40 hover:opacity-100 transition-all shrink-0"
                        >
                          <Icons.X />
                        </button>
                      </div>
                    ))}
                    <button onClick={() => setModal({ show: true, type: 'mindmap' })} className="p-2 text-[#800000] shrink-0">
                      <Icons.Plus />
                    </button>
                  </div>

                  <div className="flex-1 flex flex-col md:flex-row overflow-hidden pb-20 md:pb-0">
                    {activeMapId ? (
                      <>
                        <div className="w-full md:w-1/3 h-1/2 md:h-full border-r border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-950 flex flex-col">
                          <div className="p-4 bg-slate-50 dark:bg-slate-900/50 text-[9px] font-black uppercase tracking-widest text-slate-400 border-b border-slate-100 dark:border-slate-800 flex justify-between">
                            Outline Mode <div className="text-[#800000]">Tab to Indent</div>
                          </div>
                          <textarea
                            value={mindmaps.find(mm => mm.id === activeMapId)?.content || ''}
                            onKeyDown={e => handleEditorTab(e, v => setMindmaps(mindmaps.map(mm => mm.id === activeMapId ? { ...mm, content: v } : mm)))}
                            onChange={e => setMindmaps(mindmaps.map(mm => mm.id === activeMapId ? { ...mm, content: e.target.value } : mm))}
                            className="flex-1 w-full p-4 font-mono text-sm focus:ring-0 border-none bg-transparent dark:text-slate-100 resize-none custom-scrollbar"
                          />
                        </div>
                        <div className="flex-1 h-full bg-slate-50 dark:bg-slate-900/30 overflow-auto">
                          <MapView lines={mindmaps.find(mm => mm.id === activeMapId)?.content || ''} />
                        </div>
                      </>
                    ) : (
                      <div className="h-full flex-1 flex items-center justify-center text-slate-400 italic">
                        Select a Brainstorming Map.
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>

            <div className="fixed bottom-0 left-0 right-0 md:hidden h-20 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 z-50 shadow-[0_-4px_12px_rgba(0,0,0,0.1)] mobile-nav-safe transition-colors duration-300">
              {[
                { id: 'dashboard', icon: <Icons.Dashboard />, l: 'Home' },
                { id: 'tasks', icon: <Icons.Tasks />, l: 'Tasks' },
                { id: 'calendar', icon: <Icons.Calendar />, l: 'Plan' },
                { id: 'notes', icon: <Icons.Docs />, l: 'Docs' },
                { id: 'mapping', icon: <Icons.Map />, l: 'Maps' }
              ].map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`flex flex-col items-center justify-center flex-1 py-2 transition-all ${activeTab === tab.id ? 'text-[#800000] scale-110' : 'text-slate-300'}`}
                >
                  {tab.icon}
                  <span className="text-[9px] font-black uppercase mt-1 tracking-tighter">{tab.l}</span>
                </button>
              ))}
            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(console.error);
      });
    }
  </script>
</body>

</html>
